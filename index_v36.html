<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>喵姆看盤 v36 — Progressive Disclosure</title>
<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0b0f14; --surface:#111820; --raised:#1a2330; --border:#1e2d3d;
  --cyan:#38bdf8; --green:#34d399; --red:#f87171; --amber:#fbbf24;
  --purple:#a78bfa; --text:#e2e8f0; --sub:#64748b; --dimmer:#475569;
}
body { background:var(--bg); color:var(--text); font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; font-size:13px; }

/* TOPBAR */
.topbar { height:44px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; flex-shrink:0; }
.logo { font-size:15px; font-weight:800; color:var(--cyan); margin-right:20px; cursor:pointer; }
.stock-nav { display:flex; align-items:center; gap:6px; }
.stock-nav button { background:none; border:1px solid var(--border); color:var(--sub); cursor:pointer; font-size:13px; padding:3px 8px; border-radius:4px; transition:all .15s; }
.stock-nav button:hover { background:var(--raised); color:var(--text); }
.stock-name { font-size:15px; font-weight:700; min-width:110px; text-align:center; }
.spacer { flex:1; }
.topbar-actions { display:flex; gap:6px; }
.tb-btn { background:var(--raised); border:1px solid var(--border); color:var(--sub); font-size:11px; padding:4px 10px; border-radius:5px; cursor:pointer; transition:all .15s; }
.tb-btn:hover { color:var(--text); border-color:var(--cyan); }
.tb-btn.active { color:var(--cyan); border-color:var(--cyan); }
.topbar-meta { color:var(--sub); font-size:11px; margin-left:12px; }
.refresh-btn { background:none; border:1px solid var(--border); color:var(--cyan); font-size:11px; padding:4px 10px; border-radius:5px; cursor:pointer; transition:all .15s; }
.refresh-btn:hover { background:var(--raised); }
.refresh-btn.loading { opacity:.5; pointer-events:none; }

/* ALERT */
.alert-strip { background:linear-gradient(90deg,#450a0a,#7f1d1d); border-bottom:1px solid #dc2626; padding:0 16px; flex-shrink:0; max-height:0; overflow:hidden; transition:max-height .3s,opacity .3s; opacity:0; }
.alert-strip.show { max-height:36px; opacity:1; }
.alert-inner { display:flex; align-items:center; gap:10px; padding:7px 0; }
.alert-badge { background:#ef4444; color:#fff; font-size:9px; font-weight:800; padding:2px 7px; border-radius:3px; }
.alert-text { font-size:12px; color:#fca5a5; flex:1; }
.alert-stocks { display:flex; gap:4px; }
.alert-stock { background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.3); color:#fca5a5; font-size:10px; font-weight:700; padding:1px 7px; border-radius:10px; cursor:pointer; }
.alert-x { color:#fca5a5; cursor:pointer; opacity:.5; font-size:15px; padding:0 4px; }
.alert-x:hover { opacity:1; }

/* MAIN 3-COL */
.main { flex:1; display:grid; grid-template-columns:180px 1fr 310px; min-height:0; overflow:hidden; }

/* SIDEBAR */
.sidebar { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; min-height:0; overflow:hidden; }
.sidebar-head { padding:10px 12px 8px; flex-shrink:0; }
.sidebar-head input { width:100%; background:var(--raised); border:1px solid var(--border); border-radius:6px; padding:6px 10px; color:var(--text); font-size:12px; outline:none; }
.sidebar-head input:focus { border-color:var(--cyan); }
.sidebar-tabs { display:flex; gap:0; margin-top:6px; }
.sidebar-tab { flex:1; text-align:center; background:none; border:none; color:var(--sub); font-size:10px; font-weight:600; padding:4px 0; cursor:pointer; border-bottom:2px solid transparent; transition:all .15s; }
.sidebar-tab.active { color:var(--cyan); border-bottom-color:var(--cyan); }
.stock-list { flex:1; overflow-y:auto; }
.stock-item { padding:7px 12px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; border-left:3px solid transparent; transition:background .12s; }
.stock-item:hover { background:var(--raised); }
.stock-item.active { background:var(--raised); border-left-color:var(--cyan); }
.si-left { display:flex; flex-direction:column; gap:1px; }
.si-code { font-size:12px; font-weight:700; }
.si-name { font-size:10px; color:var(--sub); }
.si-right { text-align:right; }
.si-score { font-size:12px; font-weight:800; }
.si-verdict { font-size:9px; font-weight:600; }
.s-hi { color:var(--green); } .s-md { color:var(--amber); } .s-lo { color:var(--red); }

/* CENTER */
.center { display:flex; flex-direction:column; overflow:hidden; }
.stock-info-row { padding:10px 16px; display:flex; align-items:center; gap:14px; border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
.price-big { font-size:28px; font-weight:900; letter-spacing:-.02em; }
.price-big.up { color:var(--red); } .price-big.down { color:var(--green); }
.price-chg { font-size:12px; font-weight:600; }
.price-chg.up { color:var(--red); } .price-chg.down { color:var(--green); }
.pills { display:flex; gap:6px; margin-left:auto; flex-wrap:wrap; }
.info-pill { background:var(--raised); border:1px solid var(--border); border-radius:16px; padding:3px 10px; font-size:11px; color:var(--sub); white-space:nowrap; }
.info-pill span { color:var(--text); font-weight:600; }
.chart-area { flex:1; padding:10px 16px 6px; display:flex; flex-direction:column; overflow:hidden; }
.chart-toolbar { display:flex; gap:4px; margin-bottom:6px; flex-shrink:0; }
.chart-tab { background:none; border:1px solid transparent; border-radius:4px; color:var(--sub); font-size:11px; padding:3px 10px; cursor:pointer; transition:all .12s; }
.chart-tab:hover { color:var(--text); }
.chart-tab.active { background:var(--raised); color:var(--cyan); border-color:var(--border); }
.chart-sep { width:1px; height:16px; background:var(--border); margin:0 4px; align-self:center; }
/* Overlay toggles */
.ov-btn { background:none; border:1px solid var(--border); border-radius:12px; color:var(--sub); font-size:10px; padding:2px 10px; cursor:pointer; transition:all .15s; white-space:nowrap; }
.ov-btn:hover { color:var(--text); border-color:var(--dimmer); }
.ov-btn.on { color:var(--cyan); border-color:var(--cyan); background:rgba(56,189,248,.08); }
.ov-btn .ov-dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:4px; vertical-align:middle; }
.ov-group { display:flex; gap:4px; align-items:center; flex-wrap:wrap; }
.ov-label { font-size:9px; color:var(--dimmer); margin-right:2px; text-transform:uppercase; letter-spacing:.08em; }
#chart-container { flex:1; border-radius:8px; overflow:hidden; min-height:200px; }
.inv-bar { flex-shrink:0; margin:6px 16px 10px; padding:8px 14px; background:linear-gradient(90deg,rgba(251,191,36,.04),rgba(251,191,36,.08)); border:1px solid rgba(251,191,36,.12); border-radius:6px; display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
.inv-title { font-size:11px; color:var(--amber); font-weight:700; flex-shrink:0; }
.inv-items { display:flex; gap:14px; flex-wrap:wrap; }
.inv-item { display:flex; align-items:center; gap:5px; font-size:11px; }
.inv-dot { width:5px; height:5px; border-radius:50%; background:var(--amber); }
.inv-label { color:var(--sub); }
.inv-val { color:var(--amber); font-weight:700; }

/* RIGHT PANEL */
.right-panel { background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; min-height:0; }

/* VERDICT HERO */
.verdict-hero { padding:18px 16px 14px; text-align:center; background:linear-gradient(180deg,rgba(52,211,153,.08) 0%,transparent 100%); border-bottom:1px solid var(--border); }
.verdict-hero.bearish { background:linear-gradient(180deg,rgba(248,113,113,.08) 0%,transparent 100%); }
.verdict-hero.neutral { background:linear-gradient(180deg,rgba(251,191,36,.06) 0%,transparent 100%); }
.vh-eyebrow { font-size:9px; color:var(--sub); letter-spacing:.14em; text-transform:uppercase; margin-bottom:8px; font-weight:600; }
.vh-action { font-size:28px; font-weight:900; margin-bottom:2px; }
.vh-action.bullish { color:var(--green); } .vh-action.bearish { color:var(--red); } .vh-action.neutral { color:var(--amber); }
.vh-stats { display:flex; justify-content:center; gap:20px; margin-top:10px; }
.vh-stat { display:flex; flex-direction:column; align-items:center; gap:2px; }
.vh-num { font-size:18px; font-weight:900; }
.vh-lbl { font-size:9px; color:var(--sub); text-transform:uppercase; letter-spacing:.06em; }
.vh-conf { width:160px; margin:10px auto 0; }
.vh-conf-track { height:4px; background:var(--border); border-radius:4px; overflow:hidden; }
.vh-conf-fill { height:100%; border-radius:4px; }
.vh-conf-fill.high { background:linear-gradient(90deg,var(--cyan),var(--green)); }
.vh-conf-fill.mid { background:linear-gradient(90deg,var(--cyan),var(--amber)); }
.vh-conf-fill.low { background:linear-gradient(90deg,var(--amber),var(--red)); }
.vh-conf-text { font-size:10px; color:var(--sub); margin-top:4px; text-align:center; }

/* REASONS */
.reasons { padding:12px 16px; border-bottom:1px solid var(--border); }
.sec-title { font-size:10px; color:var(--sub); text-transform:uppercase; letter-spacing:.1em; margin-bottom:6px; font-weight:700; }
.reason { display:flex; gap:7px; padding:4px 0; font-size:12px; line-height:1.5; }
.reason + .reason { border-top:1px solid rgba(30,45,61,.4); }
.r-icon { flex-shrink:0; font-size:11px; margin-top:2px; }

/* ACTION NUMS */
.action-nums { padding:12px 16px; border-bottom:1px solid var(--border); }
.nums-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.num-card { background:var(--raised); border:1px solid var(--border); border-radius:6px; padding:8px 10px; }
.nc-label { font-size:10px; color:var(--sub); margin-bottom:2px; }
.nc-val { font-size:15px; font-weight:800; }
.nc-note { font-size:9px; color:var(--dimmer); margin-top:2px; }

/* ACCORDION */
.acc-toggle { padding:9px 16px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; border-bottom:1px solid var(--border); user-select:none; transition:background .12s; }
.acc-toggle:hover { background:var(--raised); }
.acc-left { display:flex; align-items:center; gap:7px; }
.acc-icon { font-size:13px; }
.acc-label { font-size:12px; color:var(--sub); }
.acc-label strong { color:var(--text); }
.acc-badges { display:flex; gap:4px; }
.acc-badge { font-size:9px; font-weight:700; padding:1px 7px; border-radius:10px; }
.badge-green { background:rgba(52,211,153,.1); color:var(--green); border:1px solid rgba(52,211,153,.2); }
.badge-amber { background:rgba(251,191,36,.1); color:var(--amber); border:1px solid rgba(251,191,36,.2); }
.badge-red { background:rgba(248,113,113,.1); color:var(--red); border:1px solid rgba(248,113,113,.2); }
.badge-purple { background:rgba(167,139,250,.1); color:var(--purple); border:1px solid rgba(167,139,250,.2); }
.acc-arrow { font-size:10px; color:var(--sub); transition:transform .25s ease; display:inline-block; }
.acc-arrow.open { transform:rotate(90deg); }
.acc-body { max-height:0; overflow:hidden; transition:max-height .35s ease; }
.acc-body.open { max-height:3000px; }
.acc-inner { border-bottom:1px solid var(--border); background:rgba(8,12,18,.5); }

/* Analyst cards */
.analyst { padding:10px 16px; border-bottom:1px solid rgba(30,45,61,.4); }
.analyst:last-child { border-bottom:none; }
.an-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.an-role { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:700; }
.an-dot { width:7px; height:7px; border-radius:50%; }
.an-tag { font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
.tag-bull { background:rgba(52,211,153,.1); color:var(--green); border:1px solid rgba(52,211,153,.2); }
.tag-bear { background:rgba(248,113,113,.1); color:var(--red); border:1px solid rgba(248,113,113,.2); }
.tag-neu { background:rgba(100,116,139,.15); color:var(--sub); border:1px solid rgba(100,116,139,.2); }
.an-conf { height:3px; background:var(--border); border-radius:2px; margin-bottom:5px; overflow:hidden; }
.an-conf-fill { height:100%; border-radius:2px; }
.an-ev { font-size:12px; color:var(--text); line-height:1.7; list-style:none; opacity:0.85; }
.an-ev li { padding-left:14px; position:relative; margin-bottom:3px; }
.an-ev li::before { content:''; position:absolute; left:0; top:8px; width:4px; height:4px; border-radius:50%; background:var(--dimmer); }

/* Synthesis */
.synthesis { padding:10px 16px; background:rgba(167,139,250,.04); border-top:1px solid rgba(167,139,250,.1); }
.syn-title { font-size:11px; color:var(--purple); font-weight:700; margin-bottom:4px; }
.syn-body { font-size:11px; color:var(--sub); line-height:1.6; }
.syn-body strong { color:var(--text); }

/* Industry bars */
.ind-row { padding:6px 16px; display:flex; align-items:center; gap:8px; font-size:11px; }
.ind-row + .ind-row { border-top:1px solid rgba(30,45,61,.3); }
.ind-bar-track { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.ind-bar-fill { height:100%; border-radius:3px; }
.ind-name { width:80px; color:var(--sub); flex-shrink:0; }
.ind-val { width:36px; text-align:right; font-weight:700; flex-shrink:0; }

/* Toast */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--raised); border:1px solid var(--border); color:var(--text); padding:8px 20px; border-radius:8px; font-size:12px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:999; }
.toast.show { opacity:1; }

/* Scrollbar */
::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
* { scrollbar-width:thin; scrollbar-color:var(--border) transparent; }

/* ═══ ADMIN PANEL OVERLAY ═══ */
.admin-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:1000; display:none; justify-content:center; align-items:flex-start; padding:30px; overflow-y:auto; backdrop-filter:blur(4px); }
.admin-overlay.show { display:flex; }
.admin-panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; width:100%; max-width:820px; max-height:calc(100vh - 60px); overflow-y:auto; }
.admin-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--surface); z-index:1; }
.admin-header h2 { font-size:16px; color:var(--cyan); margin:0; }
.admin-close { background:none; border:none; color:var(--sub); font-size:22px; cursor:pointer; padding:0 4px; }
.admin-close:hover { color:var(--red); }
.admin-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); padding:0 20px; background:var(--surface); position:sticky; top:53px; z-index:1; }
.admin-tab { padding:10px 16px; font-size:12px; font-weight:600; color:var(--sub); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; transition:all .15s; }
.admin-tab:hover { color:var(--text); }
.admin-tab.active { color:var(--cyan); border-bottom-color:var(--cyan); }
.admin-section { padding:16px 20px; display:none; }
.admin-section.active { display:block; }
.admin-card { background:var(--raised); border:1px solid var(--border); border-radius:8px; padding:14px; margin-bottom:12px; }
.admin-card h3 { font-size:13px; color:var(--text); margin-bottom:10px; }
.admin-label { font-size:11px; color:var(--sub); margin-bottom:4px; display:block; }
.admin-input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:7px 10px; border-radius:5px; font-size:12px; margin-bottom:8px; }
.admin-input:focus { outline:none; border-color:var(--cyan); }
.admin-input::placeholder { color:var(--dimmer); }
.admin-row { display:flex; gap:8px; align-items:flex-end; }
.admin-row .admin-input { margin-bottom:0; }
.admin-btn { background:var(--cyan); color:#0b0f14; border:none; padding:7px 14px; border-radius:5px; font-size:11px; font-weight:700; cursor:pointer; transition:opacity .15s; white-space:nowrap; }
.admin-btn:hover { opacity:.85; }
.admin-btn.danger { background:var(--red); color:#fff; }
.admin-btn.ghost { background:transparent; border:1px solid var(--border); color:var(--sub); }
.admin-btn.ghost:hover { color:var(--text); border-color:var(--text); }
.holdings-table { width:100%; border-collapse:collapse; font-size:11px; }
.holdings-table th { text-align:left; color:var(--sub); font-weight:600; padding:6px 8px; border-bottom:1px solid var(--border); }
.holdings-table td { padding:6px 8px; border-bottom:1px solid rgba(30,45,61,.3); }
.holdings-table .pos { color:var(--red); }
.holdings-table .neg { color:var(--green); }
.stock-chip { display:inline-flex; align-items:center; gap:4px; background:var(--raised); border:1px solid var(--border); padding:3px 10px; border-radius:12px; font-size:11px; margin:3px; }
.stock-chip .chip-x { cursor:pointer; color:var(--sub); font-size:13px; }
.stock-chip .chip-x:hover { color:var(--red); }
.admin-asset-row { display:flex; justify-content:space-between; padding:6px 0; font-size:12px; border-bottom:1px solid rgba(30,45,61,.2); }
.admin-asset-row:last-child { border:none; }
.admin-asset-val { font-weight:700; }
.risk-light { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; }
.risk-green { background:var(--green); }
.risk-amber { background:var(--amber); }
.risk-red { background:var(--red); }

/* Responsive */
@media (max-width:1100px) { .main { grid-template-columns:160px 1fr 280px; } }
@media (max-width:900px) { .main { grid-template-columns:1fr; } .sidebar,.right-panel { display:none; } }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo" onclick="location.reload()">🐱 喵姆 v36</div>
  <div class="stock-nav">
    <button onclick="navStock(-1)">◀</button>
    <div class="stock-name" id="navName">載入中…</div>
    <button onclick="navStock(1)">▶</button>
  </div>
  <div class="spacer"></div>
  <button class="refresh-btn" onclick="openAdmin()" style="margin-right:6px;">⚙️ 後台</button>
  <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">🔄 刷新</button>
  <div class="topbar-meta" id="topMeta"></div>
</div>

<!-- ALERT -->
<div class="alert-strip" id="alertStrip">
  <div class="alert-inner">
    <span class="alert-badge">ALERT</span>
    <span class="alert-text" id="alertText"></span>
    <div class="alert-stocks" id="alertStocks"></div>
    <span class="alert-x" onclick="document.getElementById('alertStrip').classList.remove('show')">✕</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">
      <input type="text" id="sideSearch" placeholder="搜尋代號 / 名稱…" oninput="renderSidebar()">
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" onclick="setSideTab(this,'all')">全部</button>
        <button class="sidebar-tab" onclick="setSideTab(this,'buy')">買進</button>
        <button class="sidebar-tab" onclick="setSideTab(this,'sell')">賣出</button>
      </div>
    </div>
    <div class="stock-list" id="stockList"></div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="stock-info-row" id="infoRow">
      <div>
        <div class="price-big" id="priceBig">—</div>
        <div class="price-chg" id="priceChg"></div>
      </div>
      <div class="pills" id="pills"></div>
    </div>
    <div class="chart-area">
      <div class="chart-toolbar" id="chartToolbar"></div>
      <div id="chart-container"></div>
    </div>
    <div class="inv-bar" id="invBar"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel" id="rightPanel">
    <div class="verdict-hero" id="verdictHero"></div>
    <div class="reasons" id="reasons"></div>
    <div class="action-nums" id="actionNums"></div>
    <div id="accordions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ═══ ADMIN OVERLAY ═══ -->
<div class="admin-overlay" id="adminOverlay" onclick="if(event.target===this)closeAdmin()">
<div class="admin-panel">
  <div class="admin-header">
    <h2>⚙️ 管理後台</h2>
    <button class="admin-close" onclick="closeAdmin()">✕</button>
  </div>
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="switchAdminTab(this,'tab-portfolio')">💼 持股管理</button>
    <button class="admin-tab" onclick="switchAdminTab(this,'tab-watchlist')">📋 股票池</button>
    <button class="admin-tab" onclick="switchAdminTab(this,'tab-profile')">👤 投資檔案</button>
    <button class="admin-tab" onclick="switchAdminTab(this,'tab-risk')">🚦 風控儀表板</button>
  </div>

  <!-- TAB: 持股管理 -->
  <div class="admin-section active" id="tab-portfolio">
    <div class="admin-card">
      <h3>📊 資產總覽</h3>
      <div id="assetOverview">載入中…</div>

// ═══════════ CHART HELPERS ═══════════
function calcMA(data, period) {
  var result = [];
  for (var i = period-1; i < data.length; i++) {
    var sum = 0;
    for (var j = i-period+1; j <= i; j++) sum += (data[j].close || data[j].value || 0);
    result.push({time: data[i].time, value: +(sum/period).toFixed(2)});
  }
  return result;
}

function calcRSI(data, period) {
  if (data.length < period+2) return [];
  var result = [];
  var gains = [], losses = [];
  for (var i=1; i<data.length; i++) {
    var chg = (data[i].close||data[i].value) - (data[i-1].close||data[i-1].value);
    gains.push(chg > 0 ? chg : 0);
    losses.push(chg < 0 ? -chg : 0);
  }
  var avgG = 0, avgL = 0;
  for (var i=0; i<period; i++) { avgG += gains[i]; avgL += losses[i]; }
  avgG /= period; avgL /= period;
  for (var i=period; i<gains.length; i++) {
    avgG = (avgG*(period-1)+gains[i])/period;
    avgL = (avgL*(period-1)+losses[i])/period;
    var rs = avgL===0 ? 100 : avgG/avgL;
    result.push({time: data[i+1].time, value: +(100 - 100/(1+rs)).toFixed(2)});
  }
  return result;
}

function calcEMA(data, period) {
  // Returns array of {time, value} EMA values from close/value prices
  if (data.length < period) return [];
  var k = 2 / (period + 1);
  var result = [];
  // Seed with SMA of first 'period' values
  var sum = 0;
  for (var i = 0; i < period; i++) sum += (data[i].close || data[i].value || 0);
  var ema = sum / period;
  result.push({time: data[period-1].time, value: ema});
  for (var i = period; i < data.length; i++) {
    ema = (data[i].close || data[i].value || 0) * k + ema * (1 - k);
    result.push({time: data[i].time, value: +ema.toFixed(4)});
  }
  return result;
}

function calcMACD(data) {
  // MACD(12,26,9): DIF = EMA12 - EMA26, Signal = EMA9(DIF), Histogram = DIF - Signal
  if (data.length < 35) return {dif:[], signal:[], hist:[]};
  var ema12 = calcEMA(data, 12);
  var ema26 = calcEMA(data, 26);
  // Align: ema26 starts later, so we need to sync by time
  var ema12Map = {};
  for (var i=0; i<ema12.length; i++) ema12Map[ema12[i].time] = ema12[i].value;
  var difArr = [];
  for (var i=0; i<ema26.length; i++) {
    var t = ema26[i].time;
    if (ema12Map[t] !== undefined) {
      difArr.push({time: t, value: +(ema12Map[t] - ema26[i].value).toFixed(4)});
    }
  }
  if (difArr.length < 9) return {dif:difArr, signal:[], hist:[]};
  // Signal = EMA9 of DIF
  var k = 2 / 10;
  var sigSum = 0;
  for (var i=0; i<9; i++) sigSum += difArr[i].value;
  var sig = sigSum / 9;
  var signalArr = [{time: difArr[8].time, value: +sig.toFixed(4)}];
  for (var i=9; i<difArr.length; i++) {
    sig = difArr[i].value * k + sig * (1 - k);
    signalArr.push({time: difArr[i].time, value: +sig.toFixed(4)});
  }
  // Histogram = DIF - Signal (aligned)
  var sigMap = {};
  for (var i=0; i<signalArr.length; i++) sigMap[signalArr[i].time] = signalArr[i].value;
  var histArr = [];
  for (var i=0; i<difArr.length; i++) {
    var t = difArr[i].time;
    if (sigMap[t] !== undefined) {
      var hv = +(difArr[i].value - sigMap[t]).toFixed(4);
      histArr.push({time: t, value: hv, color: hv >= 0 ? 'rgba(239,68,68,0.6)' : 'rgba(34,197,94,0.6)'});
    }
  }
  return {dif: difArr, signal: signalArr, hist: histArr};
}

var overlayPriceLines = []; // Track price lines for cleanup
function applyOverlays(s) {
  if (!chart || !s) return;
  var ph = s.price_history || [];
  if (!ph.length) return;

  // Remove old overlay series
  for (var k in overlaySeries) {
    if (overlaySeries[k]) { try{chart.removeSeries(overlaySeries[k]);}catch(e){} }
  }
  overlaySeries = {};

  // Remove old overlay price lines
  for (var pi=0; pi<overlayPriceLines.length; pi++) {
    try { candleSeries.removePriceLine(overlayPriceLines[pi]); } catch(e) {}
  }
  overlayPriceLines = [];

  // MA60 — 季線 (amber)
  if (chartOverlays.ma60) {
    var ma60data = calcMA(ph, 60);
    if (ma60data.length) {
      overlaySeries.ma60 = chart.addLineSeries({color:'#fbbf24',lineWidth:1.5,lineStyle:0,priceLineVisible:false,lastValueVisible:true,title:'MA60'});
      overlaySeries.ma60.setData(ma60data);
    } else {
      // Not enough history (58 < 60) — use API's ma60 as horizontal price line
      var ra2 = s.role_analysis || {};
      var ro2 = ra2.role_outputs || [];
      var apiMa60 = 0;
      for (var ri=0;ri<ro2.length;ri++) { if (ro2[ri].role_name==='技術分析官' && ro2[ri].raw_data) apiMa60=ro2[ri].raw_data.ma60||0; }
      if (apiMa60 > 0) {
        var pl = candleSeries.createPriceLine({price:apiMa60,color:'#fbbf24',lineWidth:1.5,lineStyle:0,axisLabelVisible:true,title:'季線'});
        overlayPriceLines.push(pl);
      }
    }
  }

  // MA20 — 月線 (purple)
  if (chartOverlays.ma20) {
    var ma20data = calcMA(ph, 20);
    if (ma20data.length) {
      overlaySeries.ma20 = chart.addLineSeries({color:'#a78bfa',lineWidth:1,lineStyle:0,priceLineVisible:false,lastValueVisible:true,title:'MA20'});
      overlaySeries.ma20.setData(ma20data);
    }
  }

  // RSI — separate scale (cyan)
  if (chartOverlays.rsi) {
    var rsiData = calcRSI(ph, 14);
    if (rsiData.length) {
      overlaySeries.rsi = chart.addLineSeries({color:'#38bdf8',lineWidth:1.5,priceScaleId:'rsi',priceLineVisible:false,lastValueVisible:true,title:'RSI'});
      overlaySeries.rsi.applyOptions({priceFormat:{type:'custom',minMove:0.01,formatter:function(v){return v.toFixed(0);}}});
      chart.priceScale('rsi').applyOptions({scaleMargins:{top:0.75,bottom:0.02},borderVisible:false});
      overlaySeries.rsi.setData(rsiData);
      // RSI 70/30 lines
      overlaySeries.rsi.createPriceLine({price:70,color:'rgba(248,113,113,0.4)',lineWidth:1,lineStyle:2,axisLabelVisible:false});
      overlaySeries.rsi.createPriceLine({price:30,color:'rgba(52,211,153,0.4)',lineWidth:1,lineStyle:2,axisLabelVisible:false});
    }
  }

  // MACD — bottom pane using left price scale
  if (chartOverlays.macd) {
    var macdData = calcMACD(ph);
    if (macdData.hist.length) {
      // Compress main price area upward to make room
      chart.priceScale('right').applyOptions({scaleMargins:{top:0.05,bottom:0.30}});
      // MACD histogram — use left scale in bottom 28%
      overlaySeries.macdHist = chart.addHistogramSeries({priceScaleId:'left',priceLineVisible:false,lastValueVisible:false,title:''});
      overlaySeries.macdHist.setData(macdData.hist);
      chart.priceScale('left').applyOptions({scaleMargins:{top:0.73,bottom:0.02},borderVisible:false,autoScale:true,visible:false});
      // DIF line (amber)
      var difFiltered = macdData.dif.filter(function(d){ var t=d.time; return macdData.hist.some(function(h){return h.time===t;}); });
      overlaySeries.macdDif = chart.addLineSeries({color:'#f59e0b',lineWidth:1.2,priceScaleId:'left',priceLineVisible:false,lastValueVisible:true,title:'DIF'});
      overlaySeries.macdDif.setData(difFiltered);
      // Signal line (purple dashed)
      overlaySeries.macdSig = chart.addLineSeries({color:'#a78bfa',lineWidth:1,lineStyle:2,priceScaleId:'left',priceLineVisible:false,lastValueVisible:true,title:'SIG'});
      overlaySeries.macdSig.setData(macdData.signal);
      // Zero line
      overlaySeries.macdDif.createPriceLine({price:0,color:'rgba(148,163,184,0.3)',lineWidth:1,lineStyle:2,axisLabelVisible:false});
    }
  } else {
    // Reset main price scale to normal when MACD is off
    chart.priceScale('right').applyOptions({scaleMargins:{top:0.08,bottom:0.18}});
  }

  // 52W High line
  if (chartOverlays.high52w && s['52w_high']) {
    var pl52 = candleSeries.createPriceLine({price:Number(s['52w_high']),color:'#f87171',lineWidth:1,lineStyle:1,axisLabelVisible:true,title:'52W高'});
    overlayPriceLines.push(pl52);
  }

  // Risk zones — mark candles below MA60 with red background markers
  if (chartOverlays.risk) {
    var ma60data2 = calcMA(ph, 60);
    var maMap = {};
    if (ma60data2.length) {
      for (var i=0; i<ma60data2.length; i++) maMap[ma60data2[i].time] = ma60data2[i].value;
    } else {
      // Fallback: use API ma60 as flat value for all data points
      var ra3 = s.role_analysis || {};
      var ro3 = ra3.role_outputs || [];
      var apiMa60r = 0;
      for (var ri=0;ri<ro3.length;ri++) { if (ro3[ri].role_name==='技術分析官' && ro3[ri].raw_data) apiMa60r=ro3[ri].raw_data.ma60||0; }
      if (apiMa60r > 0) { for (var i=0;i<ph.length;i++) maMap[ph[i].time] = apiMa60r; }
    }
    var markers = [];
    for (var i=0; i<ph.length; i++) {
      var p = ph[i];
      var mv = maMap[p.time];
      if (mv && (p.close||p.value) < mv) {
        markers.push({time:p.time,position:'belowBar',color:'rgba(239,68,68,0.6)',shape:'circle',text:''});
      }
    }
    if (markers.length && candleSeries) candleSeries.setMarkers(markers);
  } else {
    if (candleSeries) candleSeries.setMarkers([]);
  }
}

// ═══════════ CHART ═══════════
function renderChart(s) {
  var container = document.getElementById('chart-container');
  if (chart) { try{chart.remove();}catch(e){} chart=null; }
  container.innerHTML = '';
  overlaySeries = {};
  var ph = s.price_history || [];
  if (!ph.length) { container.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--sub)">暫無圖表資料</div>'; return; }
  if (typeof LightweightCharts === 'undefined') { container.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--amber)">圖表載入中…</div>'; setTimeout(function(){renderChart(s);},500); return; }

  var w = container.clientWidth || 600;
  // Fixed height based on viewport — don't trust flex container height
  var h = Math.max(350, Math.min(600, window.innerHeight - 200));
  container.style.height = h + 'px';
  container.style.maxHeight = h + 'px';

  chart = LightweightCharts.createChart(container, {
    layout:{background:{type:'solid',color:'transparent'},textColor:'#64748b',fontSize:11},
    grid:{vertLines:{color:'rgba(51,65,85,0.2)'},horzLines:{color:'rgba(51,65,85,0.2)'}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    rightPriceScale:{borderColor:'#1e293b',scaleMargins:{top:0.08,bottom:0.18}},
    timeScale:{borderColor:'#1e293b',timeVisible:false,rightOffset:7},
    width:w, height:h
  });

  var hasOHLC = ph[0].open !== undefined;
  if (hasOHLC) {
    candleSeries = chart.addCandlestickSeries({
      upColor:'#ef4444',downColor:'#22c55e',borderUpColor:'#ef4444',borderDownColor:'#22c55e',
      wickUpColor:'#ef4444',wickDownColor:'#22c55e'
    });
    candleSeries.setData(ph.map(function(p){return{time:p.time,open:p.open,high:p.high,low:p.low,close:p.close};}));
  } else {
    candleSeries = chart.addAreaSeries({lineColor:'#3b82f6',topColor:'rgba(59,130,246,0.2)',bottomColor:'transparent',lineWidth:2});
    candleSeries.setData(ph.map(function(p){return{time:p.time,value:p.value||p.close};}));
  }

  // Volume
  if (ph[0].volume !== undefined) {
    var volSeries = chart.addHistogramSeries({color:'rgba(100,116,139,0.3)',priceFormat:{type:'volume'},priceScaleId:'vol'});
    chart.priceScale('vol').applyOptions({scaleMargins:{top:0.85,bottom:0}});
    volSeries.setData(ph.map(function(p){return{time:p.time,value:p.volume||0,color:p.close>=p.open?'rgba(239,68,68,0.25)':'rgba(34,197,94,0.25)'};}));
  }

  // Stop loss line
  if (s.stop_loss_price) {
    candleSeries.createPriceLine({price:s.stop_loss_price,color:'#f87171',lineWidth:1,lineStyle:2,axisLabelVisible:true,title:'停損'});
  }
  // Target line
  if (s.target_price) {
    candleSeries.createPriceLine({price:s.target_price,color:'#34d399',lineWidth:1,lineStyle:2,axisLabelVisible:true,title:'目標'});
  }

  // Apply overlays
  applyOverlays(s);

  chart.timeScale().fitContent();
  window.onresize = function(){ if(chart) chart.applyOptions({width:container.clientWidth}); };

  // Render toolbar
  renderChartToolbar();
}

// ═══════════ VERDICT HERO ═══════════
function renderVerdict(s) {
  var ra = s.role_analysis || {};
  var dir = ra.final_direction || 'neutral';
  var score = s['評分'] || 0;
  var conf = ra.confidence || 0;
  // Recalc confidence from score if too low
  var displayConf = Math.max(conf, Math.min(95, Math.round(score * 10)));

  var ro = ra.role_outputs || [];
  var bullCount = 0;
  for (var i=0;i<ro.length;i++) { if ((ro[i].confidence||0)>=50) bullCount++; }

  var actionText, actionClass, heroClass;
  var act = s['建議類別'] || '';
  // Score-first logic: score is the ultimate synthesized verdict
  if (act === 'action-sell' || score <= 4) {
    actionText = '⚠️ 建議賣出'; actionClass = 'bearish'; heroClass = 'bearish';
  } else if (act === 'action-hold' || (score > 4 && score < 7)) {
    actionText = '⏳ 觀望等待'; actionClass = 'neutral'; heroClass = 'neutral';
  } else if (score >= 9) {
    actionText = '🚀 強力買進'; actionClass = 'bullish'; heroClass = '';
  } else {
    actionText = '👍 建議買進'; actionClass = 'bullish'; heroClass = '';
  }

  var confLevel = displayConf >= 65 ? 'high' : displayConf >= 40 ? 'mid' : 'low';

  document.getElementById('verdictHero').className = 'verdict-hero ' + heroClass;
  document.getElementById('verdictHero').innerHTML =
    '<div class="vh-eyebrow">喵姆 AI 判決</div>' +
    '<div class="vh-action '+actionClass+'">'+actionText+'</div>' +
    '<div class="vh-stats">' +
      '<div class="vh-stat"><div class="vh-num" style="color:var(--'+(actionClass==='bearish'?'red':'green')+')">'+score+'</div><div class="vh-lbl">評分</div></div>' +
      '<div class="vh-stat"><div class="vh-num" style="color:var(--cyan)">'+displayConf+'%</div><div class="vh-lbl">AI 信心</div></div>' +
      '<div class="vh-stat"><div class="vh-num" style="color:var(--'+(actionClass==='bearish'?'red':'green')+')">'+bullCount+'/'+ro.length+'</div><div class="vh-lbl">看多</div></div>' +
    '</div>' +
    '<div class="vh-conf"><div class="vh-conf-track"><div class="vh-conf-fill '+confLevel+'" style="width:'+displayConf+'%"></div></div>' +
    '<div class="vh-conf-text">'+ro.length+' 位分析師 '+bullCount+' 位偏多 · 衝突度 '+Math.round((ra.conflict_intensity||0)*100)+'%</div></div>';
}

// ═══════════ ACTION NUMBERS ═══════════
function renderActionNums(s) {
  var price = s['收盤價']||0;
  var sl = s.stop_loss_price || s['停損參考'] || 0;
  var tp = s.target_price || s['目標價'] || 0;
  var rr = s['風險報酬比'] || 0;
  var kelly = s.kelly || {};
  var slPct = price ? ((sl-price)/price*100).toFixed(1)+'%' : '';
  var tpPct = price ? ((tp-price)/price*100).toFixed(1)+'%' : '';

  // Compute kelly position using same logic as buildKellyDetails
  var posSize = '50%';
  var posNote = '預設建議';
  var bt = s.backtest || {};
  var btTradeCount = bt.trade_count || 0;
  var lastPrice = price;
  var riskAmt = lastPrice - sl;
  var rewardAmt = tp - lastPrice;
  var actualRR = (riskAmt > 0 && rewardAmt > 0) ? (rewardAmt / riskAmt) : (rr || 1);
  var useBacktest = btTradeCount >= 3;
  var winRate;
  if (useBacktest) {
    winRate = bt.win_rate || 0;
  } else {
    var ra = s.role_analysis || {};
    var ro = ra.role_outputs || [];
    var confSum = 0, confCount = 0;
    for (var ci = 0; ci < ro.length; ci++) { if (ro[ci].confidence) { confSum += ro[ci].confidence; confCount++; } }
    var avgConf = confCount > 0 ? confSum / confCount : 50;
    winRate = Math.max(30, Math.min(85, avgConf * 0.75 + 5));
  }
  var p = winRate / 100, q = 1 - p, b = actualRR;
  var kellyRaw = b > 0 ? ((p * b - q) / b * 100) : 0;
  if (kellyRaw < 0) kellyRaw = 0;
  if (kellyRaw > 100) kellyRaw = 100;
  var halfKelly = Math.round(kellyRaw / 2);
  if (kelly.pct > 0) { posSize = kelly.pct + '%'; posNote = kelly.label || ''; }
  else if (halfKelly > 0) { posSize = halfKelly + '%'; posNote = '半凱利'; }
  else { posSize = '觀望'; posNote = '信號不足'; }

  document.getElementById('actionNums').innerHTML =
    '<div class="sec-title">操作參考</div><div class="nums-grid">' +
    '<div class="num-card"><div class="nc-label">停損</div><div class="nc-val" style="color:var(--red)">$'+Math.round(sl).toLocaleString()+'</div><div class="nc-note">'+slPct+'</div></div>' +
    '<div class="num-card"><div class="nc-label">目標</div><div class="nc-val" style="color:var(--green)">$'+Math.round(tp).toLocaleString()+'</div><div class="nc-note">'+tpPct+'</div></div>' +
    '<div class="num-card"><div class="nc-label">風報比</div><div class="nc-val" style="color:var(--amber)">1 : '+actualRR.toFixed(1)+'</div><div class="nc-note">'+(actualRR<1?'偏低，留意':actualRR>=2?'佳':'尚可')+'</div></div>' +
    '<div class="num-card"><div class="nc-label">建議倉位</div><div class="nc-val" style="color:var(--text)">'+posSize+'</div><div class="nc-note">'+posNote+'</div></div>' +
    '</div>';
}

// ═══════════ RADAR SVG ═══════════
function buildRadarSVG(dims) {
  var cx=110, cy=100, R=75, n=dims.length;
  var svg = '<div style="text-align:center;padding:12px 0 4px"><svg width="220" height="210" viewBox="0 0 220 210">';
  // Grid rings
  for (var ring=1;ring<=4;ring++) {
    var r = R*ring/4;
    var pts = [];
    for (var i=0;i<n;i++) {
      var a = Math.PI*2*i/n - Math.PI/2;
      pts.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1));
    }
    svg += '<polygon points="'+pts.join(' ')+'" fill="none" stroke="rgba(100,116,139,0.15)" stroke-width="1"/>';
  }
  // Axes
  for (var i=0;i<n;i++) {
    var a = Math.PI*2*i/n - Math.PI/2;
    svg += '<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+R*Math.cos(a)).toFixed(1)+'" y2="'+(cy+R*Math.sin(a)).toFixed(1)+'" stroke="rgba(100,116,139,0.1)" stroke-width="1"/>';
  }
  // Data polygon
  var dataPts = [];
  for (var i=0;i<n;i++) {
    var v = Math.min(100, Math.max(0, dims[i].val)) / 100;
    var a = Math.PI*2*i/n - Math.PI/2;
    dataPts.push((cx+R*v*Math.cos(a)).toFixed(1)+','+(cy+R*v*Math.sin(a)).toFixed(1));
  }
  svg += '<polygon points="'+dataPts.join(' ')+'" fill="rgba(56,189,248,0.12)" stroke="#38bdf8" stroke-width="1.5"/>';
  // Data dots + labels
  for (var i=0;i<n;i++) {
    var v = Math.min(100, Math.max(0, dims[i].val)) / 100;
    var a = Math.PI*2*i/n - Math.PI/2;
    var dx = cx+R*v*Math.cos(a), dy = cy+R*v*Math.sin(a);
    var lx = cx+(R+16)*Math.cos(a), ly = cy+(R+16)*Math.sin(a);
    var clr = dims[i].val>=70?'#34d399':dims[i].val>=40?'#fbbf24':'#f87171';
    svg += '<circle cx="'+dx.toFixed(1)+'" cy="'+dy.toFixed(1)+'" r="3" fill="'+clr+'"/>';
    var anchor = Math.abs(Math.cos(a))<0.3?'middle':(Math.cos(a)>0?'start':'end');
    svg += '<text x="'+lx.toFixed(1)+'" y="'+(ly+4).toFixed(1)+'" fill="#94a3b8" font-size="9" text-anchor="'+anchor+'">'+dims[i].label+'</text>';
  }
  svg += '</svg></div>';
  return svg;
}

// ═══════════ KELLY DETAILS ═══════════
function buildKellyDetails(s) {
  var kelly = s.kelly || {};
  var bt = s.backtest || {};
  var btWinRate = bt.win_rate || 0;
  var btTradeCount = bt.trade_count || 0;
  var pct = kelly.pct || 0;
  var label = kelly.label || '—';

  // Compute ACTUAL payoff ratio from stop_loss / target prices
  var lastPrice = (s.price_history && s.price_history.length) ? (s.price_history[s.price_history.length-1].close || s.price_history[s.price_history.length-1].value || 0) : 0;
  var slPrice = s.stop_loss_price || 0;
  var tpPrice = s.target_price || 0;
  var riskAmt = lastPrice - slPrice;
  var rewardAmt = tpPrice - lastPrice;
  var actualRR = (riskAmt > 0 && rewardAmt > 0) ? (rewardAmt / riskAmt) : (s['風險報酬比'] || 1);

  // Determine win probability source
  var useBacktest = btTradeCount >= 3;
  var winRate, winSrc;
  if (useBacktest) {
    winRate = btWinRate;
    winSrc = '回測 (' + btTradeCount + '筆)';
  } else {
    // Derive from AI analyst consensus confidence
    var ra = s.role_analysis || {};
    var ro = ra.role_outputs || [];
    var confSum = 0, confCount = 0;
    for (var i = 0; i < ro.length; i++) {
      if (ro[i].confidence) { confSum += ro[i].confidence; confCount++; }
    }
    var avgConf = confCount > 0 ? confSum / confCount : 50;
    // Map confidence to win probability: 80%conf → 65%win, 60%conf → 50%win
    winRate = Math.max(30, Math.min(85, avgConf * 0.75 + 5));
    winSrc = 'AI共識推估';
  }

  // Kelly formula: f* = (p × b − q) / b
  var p = winRate / 100;
  var q = 1 - p;
  var b = actualRR;
  var kellyRaw = b > 0 ? ((p * b - q) / b * 100) : 0;
  if (kellyRaw < 0) kellyRaw = 0;
  if (kellyRaw > 100) kellyRaw = 100;

  // Half-Kelly for practical use
  var halfKelly = Math.round(kellyRaw / 2);
  // Use API pct if available and reasonable, otherwise use half-Kelly
  var finalPct = pct > 0 ? pct : halfKelly;
  var finalLabel = pct > 0 ? label : (halfKelly > 0 ? '半凱利' : '觀望');

  // Determine risk level color and label
  var riskColor = finalPct >= 20 ? 'var(--green)' : (finalPct >= 10 ? 'var(--cyan)' : (finalPct > 0 ? 'var(--amber)' : 'var(--red)'));
  var riskLevel = finalPct >= 20 ? '積極' : (finalPct >= 10 ? '穩健' : (finalPct > 0 ? '保守' : '不建議'));

  var h = '<div class="acc-toggle" onclick="toggleAcc(this)"><div class="acc-left"><span class="acc-icon">💰</span><span class="acc-label"><strong>資金配置建議</strong></span></div><div class="acc-badges"><span class="acc-badge badge-purple">'+riskLevel+' '+finalPct+'%</span></div><span class="acc-arrow">▶</span></div>';
  h += '<div class="acc-body"><div class="acc-inner" style="padding:12px 16px;">';

  // --- Main result: big clear answer ---
  h += '<div style="text-align:center;padding:10px 0 12px;">';
  h += '<div style="font-size:10px;color:var(--sub);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;">建議這檔投入總資金的</div>';
  h += '<div style="font-size:32px;font-weight:900;color:'+riskColor+';">'+finalPct+'%</div>';
  h += '<div style="font-size:11px;color:var(--dimmer);margin-top:4px;">'+riskLevel+'型配置</div>';
  h += '</div>';

  // --- Practical examples ---
  h += '<div style="font-size:11px;color:var(--sub);line-height:1.9;">';
  h += '<div style="margin-bottom:8px;color:var(--purple);font-weight:700;font-size:10px;letter-spacing:.06em;">💡 白話文翻譯</div>';
  if (finalPct > 0) {
    function kellyAmt(base) { var v = base * finalPct / 100; return v < 1 ? (v * 10000).toFixed(0) + ' 元' : v.toFixed(1).replace(/\.0$/,'') + ' 萬'; }
    h += '<div style="padding:8px 10px;background:var(--raised);border-radius:6px;margin-bottom:8px;">';
    h += '<div style="color:var(--text);font-weight:600;margin-bottom:4px;">假設你的股票帳戶有：</div>';
    h += '<div>📌 1 萬 → 這檔最多投 <strong style="color:var(--cyan)">'+kellyAmt(1)+'</strong></div>';
    h += '<div>📌 5 萬 → 這檔最多投 <strong style="color:var(--cyan)">'+kellyAmt(5)+'</strong></div>';
    h += '<div>📌 10 萬 → 這檔最多投 <strong style="color:var(--cyan)">'+kellyAmt(10)+'</strong></div>';
    h += '<div>📌 20 萬 → 這檔最多投 <strong style="color:var(--cyan)">'+kellyAmt(20)+'</strong></div>';
    h += '</div>';
  } else {
    h += '<div style="padding:8px 10px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.15);border-radius:6px;margin-bottom:8px;">';
    h += '<div style="color:var(--red);font-weight:600;">⚠ 目前信號不足，不建議進場</div>';
    h += '<div style="color:var(--sub);margin-top:4px;">勝率或風險報酬比不夠理想，等待更好的機會</div>';
    h += '</div>';
  }

  // --- Why this number ---
  h += '<div style="margin-bottom:8px;color:var(--purple);font-weight:700;font-size:10px;letter-spacing:.06em;">📊 這個數字怎麼來的</div>';
  h += '<div style="padding:8px 10px;background:var(--raised);border-radius:6px;margin-bottom:6px;">';
  h += '<div>預估勝率：<strong style="color:var(--text)">'+winRate.toFixed(0)+'%</strong> <span style="color:var(--dimmer);font-size:10px;">（'+winSrc+'）</span></div>';
  h += '<div>風險報酬比：<strong style="color:var(--text)">1 : '+b.toFixed(1)+'</strong> <span style="color:var(--dimmer);font-size:10px;">（賠 $'+Math.round(riskAmt)+' 賺 $'+Math.round(rewardAmt)+'）</span></div>';
  h += '<div style="margin-top:4px;color:var(--dimmer);font-size:10px;">意思是：每次做對能賺的錢，是做錯會賠的 '+b.toFixed(1)+' 倍</div>';
  h += '</div>';

  // --- Safety note ---
  if (!useBacktest) {
    h += '<div style="font-size:10px;color:var(--amber);margin-bottom:4px;">⚠ 回測資料不足（'+btTradeCount+' 筆），勝率用 AI 分析推估，僅供參考</div>';
  }
  h += '<div style="font-size:10px;color:var(--dimmer);">※ 以上為數學模型建議，實際請依個人風險承受度調整。新手建議再打半折。</div>';

  h += '</div></div></div>';
  return h;
}

// ═══════════ MY HOLDING CARD (right panel) ═══════════
function renderMyHolding(s) {
  var code = s['股票代號'] || currentCode;
  var holdings = getPortfolio();
  var mine = null;
  for (var i=0;i<holdings.length;i++) { if (holdings[i].code === code) { mine = holdings[i]; break; } }
  // remove old card if exists
  var old = document.getElementById('myHoldingCard');
  if (old) old.remove();
  if (!mine) return;

  var price = s['收盤價'] || 0;
  // update currentPrice in storage
  if (price > 0) {
    mine.currentPrice = price;
    savePortfolioData(holdings);
  }
  var cost = mine.cost || 0;
  var shares = mine.shares || 0;
  var pl = (price - cost) * shares;
  var plPct = cost > 0 ? ((price - cost) / cost * 100).toFixed(1) : '—';
  var plColor = pl >= 0 ? 'var(--red)' : 'var(--green)';
  var profile = getProfile();
  var hideCost = profile.hideCost || false;

  var card = document.createElement('div');
  card.id = 'myHoldingCard';
  card.style.cssText = 'background:linear-gradient(135deg,rgba(56,189,248,.06),rgba(167,139,250,.06));border:1px solid rgba(56,189,248,.15);border-radius:8px;padding:10px 14px;margin:8px 16px;';
  var h = '<div style="font-size:11px;font-weight:700;color:var(--cyan);margin-bottom:6px;">💼 我的持股</div>';
  h += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span>持有 '+shares.toLocaleString()+' 股</span><span>成本 '+(hideCost?'••••':'$'+cost)+'</span></div>';
  if (!hideCost) {
    h += '<div style="display:flex;justify-content:space-between;font-size:12px;"><span>損益</span><span style="font-weight:700;color:'+plColor+'">'+(pl>=0?'+':'')+Math.round(pl).toLocaleString()+' ('+plPct+'%)</span></div>';
  }
  if (mine.target) h += '<div style="font-size:11px;color:var(--sub);margin-top:4px;">目標 $'+mine.target+(mine.stopLoss?' · 停損 $'+mine.stopLoss:'')+'</div>';
  if (mine.note) h += '<div style="font-size:11px;color:var(--dimmer);margin-top:2px;">📝 '+mine.note+'</div>';
  card.innerHTML = h;

  // Insert after verdictHero
  var verdictHero = document.getElementById('verdictHero');
  verdictHero.parentNode.insertBefore(card, verdictHero.nextSibling);
}

function renderAnalystAccordion(s) {
  var ra = s.role_analysis || {};
  var ro = ra.role_outputs || [];
  var confBadge = (ra.conflict_intensity||0) < 0.3 ? '<span class="acc-badge badge-green">共識 ✓</span>' : '<span class="acc-badge badge-red">有衝突</span>';

  // Rename to more friendly title
  var analystTitle = (ra.conflict_intensity||0) < 0.3 ? 'AI 分析師意見一致' : 'AI 分析師意見分歧';

  var h = '<div class="acc-toggle" onclick="toggleAcc(this)"><div class="acc-left"><span class="acc-icon">🤖</span><span class="acc-label"><strong>AI 怎麼判斷的</strong></span></div><div class="acc-badges">'+confBadge+'</div><span class="acc-arrow">▶</span></div>';
  h += '<div class="acc-body"><div class="acc-inner">';

  // Synthesis FIRST - the conclusion up top
  h += '<div class="synthesis"><div class="syn-title">💬 結論</div><div class="syn-body" style="font-size:12px;line-height:1.7;">';
  if (ra.summary_human) h += '<strong style="color:var(--text);">'+ra.summary_human+'</strong> ';
  if (ra.integration_reason) h += '<span style="color:var(--sub);">'+ra.integration_reason+'</span>';
  h += '</div></div>';

  var colors = {'籌碼分析官':'#94a3b8','技術分析官':'#34d399','情境分析官':'#38bdf8','風險評估官':'#f87171'};
  var friendlyNames = {'籌碼分析官':'大戶動向','技術分析官':'技術走勢','情境分析官':'市場環境','風險評估官':'風險評估'};

  for (var i=0; i<ro.length; i++) {
    var r = ro[i];
    var conf = r.confidence || 50;
    var c = colors[r.role_name] || '#64748b';
    var tagClass = conf >= 60 ? 'tag-bull' : conf <= 40 ? 'tag-bear' : 'tag-neu';
    var tagText = conf >= 60 ? '看多' : conf <= 40 ? '看空' : '中性';
    var friendlyName = friendlyNames[r.role_name] || r.role_name;
    h += '<div class="analyst"><div class="an-head"><div class="an-role"><div class="an-dot" style="background:'+c+'"></div>'+friendlyName+'</div><span class="an-tag '+tagClass+'">'+tagText+'</span></div>';
    h += '<div class="an-conf"><div class="an-conf-fill" style="width:'+conf+'%;background:'+c+'"></div></div>';
    h += '<ul class="an-ev">';
    // Generate PLAIN LANGUAGE evidence from raw_data
    var rd = r.raw_data || {};
    if (r.role_name === '籌碼分析官') {
      var fn = rd.foreign_net || 0;
      var fnDir = fn > 0 ? '買' : '賣';
      var fnAmt = Math.abs(Math.round(fn));
      h += '<li>外資最近在<strong>'+(fn>0?'買進':'賣出')+'</strong>（淨'+fnDir+' '+fnAmt.toLocaleString()+' 張）</li>';
      var pd = rd.positive_days || 0;
      if (pd > 0) h += '<li>已經連續買超 <strong>'+pd+' 天</strong>，買氣持續</li>';
      else h += '<li>近期沒有持續買超跡象</li>';
    } else if (r.role_name === '技術分析官') {
      var cl = rd.close || 0, ma = rd.ma60 || 0;
      if (cl > ma) h += '<li>股價 $'+cl+' <strong>在季線之上</strong>（$'+Math.round(ma)+'），中期趨勢偏多</li>';
      else h += '<li>股價 $'+cl+' <strong>跌破季線</strong>（$'+Math.round(ma)+'），中期趨勢偏弱</li>';
      var rsi = rd.rsi || 0;
      if (rsi > 70) h += '<li>短線漲多了，有<strong>過熱</strong>風險（RSI '+rsi.toFixed(0)+'）</li>';
      else if (rsi < 30) h += '<li>短線跌深了，可能有<strong>反彈</strong>機會（RSI '+rsi.toFixed(0)+'）</li>';
      else h += '<li>短線動能正常，不過熱也不過冷</li>';
      var md2 = rd.macd_diff || 0;
      if (md2 > 0) h += '<li>上漲動能正在<strong>加速</strong></li>';
      else h += '<li>上漲動能<strong>趨緩</strong>或已轉弱</li>';
    } else if (r.role_name === '情境分析官') {
      h += '<li>產業趨勢：'+(rd.sector_trend||'無明確方向')+'</li>';
      h += '<li>市場氣氛：'+(rd.market_sentiment||'一般')+'</li>';
      if (rd.has_positive_news) h += '<li>💡 有利多消息，可能推升股價</li>';
      if (rd.has_negative_news) h += '<li>⚠ 有利空消息，需要注意</li>';
    } else if (r.role_name === '風險評估官') {
      var vol = rd.volatility || 0;
      if (vol > 25) h += '<li>這檔<strong>波動很大</strong>，高風險（日波動 '+vol.toFixed(1)+'%）</li>';
      else if (vol > 15) h += '<li>波動中等，正常範圍</li>';
      else h += '<li>波動小，走勢相對穩定</li>';
      var dd = rd.current_drawdown || 0;
      if (Math.abs(dd) > 10) h += '<li>目前離高點已回跌 <strong>'+Math.abs(dd).toFixed(1)+'%</strong></li>';
      else if (Math.abs(dd) > 0) h += '<li>離高點小幅回落 '+Math.abs(dd).toFixed(1)+'%，尚可接受</li>';
      else h += '<li>目前在高點附近</li>';
    }
    h += '</ul></div>';
  }

  h += '</div></div>';
  return h;
}

function renderSevenDimAccordion(s) {
  var cd = s.chart_data || {};
  var ra = s.role_analysis || {};
  var score = s['評分'] || 0;

  // Derive chips score from raw_data if chart_data.chips is 0
  var chipsScore = cd.chips || 0;
  if (chipsScore === 0 && ra.role_outputs) {
    for (var ci=0; ci<ra.role_outputs.length; ci++) {
      if (ra.role_outputs[ci].role_name === '籌碼分析官') {
        var crd = ra.role_outputs[ci].raw_data || {};
        var cConf = ra.role_outputs[ci].confidence || 50;
        // Build score from confidence + net flows
        chipsScore = Math.round(cConf);
        var fn = crd.foreign_net || 0;
        var tn = crd.trust_net || 0;
        if (fn > 0) chipsScore = Math.min(100, chipsScore + 10);
        if (fn < 0) chipsScore = Math.max(0, chipsScore - 10);
        if (tn > 0) chipsScore = Math.min(100, chipsScore + 5);
        if (crd.positive_days > 3) chipsScore = Math.min(100, chipsScore + 10);
        break;
      }
    }
  }
  var dims = [
    {label:'財報健康', val:cd.fundamental||0},
    {label:'技術雷達', val:cd.tech_ma||0},
    {label:'MACD動能', val:cd.tech_macd||0},
    {label:'籌碼透視', val:chipsScore}
  ];
  // Derived dims
  var devilScore = Math.max(0, 100 - (ra.confidence||50));
  dims.push({label:'惡魔代言', val:Math.round(devilScore)});
  var indScore = 50;
  if (s.roe) indScore = Math.min(100, Math.max(0, s.roe * 200));
  dims.push({label:'產業結構', val:Math.round(indScore)});
  var leadScore = 50;
  var fd = parseInt(s['外資動向']||0), td = parseInt(s['投信動向']||0);
  if (fd>5000) leadScore+=20; if(fd<-5000) leadScore-=20;
  if (td>1000) leadScore+=15; if(td<-1000) leadScore-=15;
  dims.push({label:'先行指標', val:Math.min(100,Math.max(0,Math.round(leadScore)))});

  var h = '<div class="acc-toggle" onclick="toggleAcc(this)"><div class="acc-left"><span class="acc-icon">📊</span><span class="acc-label"><strong>七維評分明細</strong></span></div><div class="acc-badges"><span class="acc-badge badge-green">'+score+'/10</span></div><span class="acc-arrow open">▶</span></div>';
  h += '<div class="acc-body open"><div class="acc-inner">';

  // === RADAR CHART (SVG) ===
  h += buildRadarSVG(dims);

  // === BAR DETAILS ===
  for (var i=0;i<dims.length;i++) {
    var d = dims[i];
    var color = d.val>=70?'var(--green)':d.val>=40?'var(--amber)':'var(--red)';
    h += '<div class="ind-row"><span class="ind-name">'+d.label+'</span><div class="ind-bar-track"><div class="ind-bar-fill" style="width:'+d.val+'%;background:'+color+'"></div></div><span class="ind-val" style="color:'+color+'">'+d.val+'</span></div>';
  }
  h += '</div></div>';
  return h;
}

function renderBacktestAccordion(s) {
  var bt = s.backtest || {};
  if (!bt.total_return && !bt.win_rate) return '';
  var tc = bt.trade_count || 0;
  var insufficient = tc < 3;
  var badgeColor = insufficient ? 'badge-amber' : 'badge-green';
  var badgeText = insufficient ? '樣本不足' : '勝率 '+(bt.win_rate||0).toFixed(0)+'%';
  var h = '<div class="acc-toggle" onclick="toggleAcc(this)"><div class="acc-left"><span class="acc-icon">📈</span><span class="acc-label"><strong>回測績效</strong></span></div><div class="acc-badges"><span class="acc-badge '+badgeColor+'">'+badgeText+'</span></div><span class="acc-arrow">▶</span></div>';
  h += '<div class="acc-body"><div class="acc-inner" style="padding:12px 16px;">';

  if (insufficient) {
    h += '<div style="padding:8px 12px;margin-bottom:10px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,.15);border-radius:6px;font-size:11px;color:var(--amber);">⚠ 過去只模擬了 '+tc+' 次交易，次數太少，以下數據僅供參考</div>';
  }

  h += '<div style="font-size:11px;color:var(--sub);line-height:1.9;">';

  // 總報酬 - plain language
  var tr = bt.total_return || 0;
  var trColor = tr >= 0 ? 'var(--green)' : 'var(--red)';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);">';
  h += '<span>模擬交易結果</span>';
  h += '<strong style="color:'+trColor+';font-size:13px;">'+(tr>=0?'賺 ':'虧 ')+Math.abs(tr).toFixed(1)+'%</strong>';
  h += '</div>';

  // 勝率 - plain language
  var wr = bt.win_rate || 0;
  var wrText = wr >= 60 ? '做對的次數偏多' : (wr >= 45 ? '勝負各半' : '做錯的次數偏多');
  var wrColor = wr >= 60 ? 'var(--green)' : (wr >= 45 ? 'var(--amber)' : 'var(--red)');
  h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);">';
  h += '<span>做對幾次</span>';
  h += '<strong style="color:'+wrColor+';">'+tc+' 次中做對 '+Math.round(tc*wr/100)+' 次（'+wr.toFixed(0)+'%）</strong>';
  h += '</div>';

  // 最大回撤 - plain language
  var md = bt.max_drawdown || 0;
  var mdLevel = Math.abs(md) <= 5 ? '小' : (Math.abs(md) <= 15 ? '中等' : '大');
  var mdColor = Math.abs(md) <= 5 ? 'var(--green)' : (Math.abs(md) <= 15 ? 'var(--amber)' : 'var(--red)');
  h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);">';
  h += '<span>最慘虧多少</span>';
  h += '<strong style="color:'+mdColor+';">曾虧 '+Math.abs(md).toFixed(1)+'%（波動'+mdLevel+'）</strong>';
  h += '</div>';

  // Sharpe - plain language
  var sh = bt.sharpe || 0;
  var shText = sh >= 1.5 ? '非常好，值得承擔風險' : (sh >= 1.0 ? '不錯，風險可接受' : (sh >= 0.5 ? '普通，注意控管' : '偏差，謹慎操作'));
  var shColor = sh >= 1.5 ? 'var(--green)' : (sh >= 1.0 ? 'var(--cyan)' : (sh >= 0.5 ? 'var(--amber)' : 'var(--red)'));
  h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;">';
  h += '<span>冒險值不值得</span>';
  h += '<strong style="color:'+shColor+';">'+shText+'</strong>';
  h += '</div>';

  // Summary verdict
  var goodSignals = 0;
  if (tr > 0) goodSignals++;
  if (wr >= 50) goodSignals++;
  if (Math.abs(md) < 15) goodSignals++;
  if (sh >= 1.0) goodSignals++;
  var summaryColor = goodSignals >= 3 ? 'rgba(52,211,153,.1)' : (goodSignals >= 2 ? 'rgba(251,191,36,.08)' : 'rgba(248,113,113,.08)');
  var summaryBorder = goodSignals >= 3 ? 'var(--green)' : (goodSignals >= 2 ? 'var(--amber)' : 'var(--red)');
  var summaryText = goodSignals >= 3 ? '✅ 回測表現正面，策略可參考' : (goodSignals >= 2 ? '⚠️ 回測表現普通，建議搭配其他判斷' : '❌ 回測表現不佳，建議觀望');
  h += '<div style="margin-top:10px;padding:8px 12px;background:'+summaryColor+';border-left:3px solid '+summaryBorder+';border-radius:4px;font-size:11px;font-weight:600;color:var(--text);">'+summaryText+'</div>';

  h += '</div></div></div>';
  return h;
}

  var holdings = getPortfolio();

  holdings.forEach(function(h){
    totalCost += (h.cost || 0) * (h.shares || 0);
    totalMarket += (h.currentPrice || h.cost || 0) * (h.shares || 0);
  });
  var cash = (profile.capital || 0) * 10000 - totalCost;
  if (cash < 0) cash = 0;
  var totalAssets = cash + totalMarket;
  var totalPL = totalMarket - totalCost;
  var plPct = totalCost > 0 ? (totalPL / totalCost * 100).toFixed(1) : '0.0';
  var plColor = totalPL >= 0 ? 'var(--red)' : 'var(--green)';
  var h = '';
  h += '<div class="admin-asset-row"><span>現金部位</span><span class="admin-asset-val">$' + cash.toLocaleString() + '</span></div>';
  h += '<div class="admin-asset-row"><span>持股市值</span><span class="admin-asset-val">$' + totalMarket.toLocaleString() + '</span></div>';
  h += '<div class="admin-asset-row"><span>總資產</span><span class="admin-asset-val">$' + totalAssets.toLocaleString() + '</span></div>';
  h += '<div class="admin-asset-row"><span>總損益</span><span class="admin-asset-val" style="color:'+plColor+'">' + (totalPL>=0?'+':'') + totalPL.toLocaleString() + ' (' + plPct + '%)</span></div>';

}

function addHolding() {
  var code = document.getElementById('addCode').value.trim();
  var name = document.getElementById('addName').value.trim();
  var shares = parseFloat(document.getElementById('addShares').value) || 0;
  var cost = parseFloat(document.getElementById('addCost').value) || 0;
  if (!code) { showToast('請輸入股票代號'); return; }
  if (!shares || !cost) { showToast('請輸入股數和成本價'); return; }
  var holdings = getPortfolio();
  // check if already exists
  var existing = holdings.findIndex(function(h){ return h.code === code; });
  if (existing >= 0) {
    // merge: average cost
    var old = holdings[existing];
    var totalShares = old.shares + shares;
    var avgCost = (old.cost * old.shares + cost * shares) / totalShares;
    holdings[existing].shares = totalShares;
    holdings[existing].cost = Math.round(avgCost * 10) / 10;
    if (name) holdings[existing].name = name;
  } else {
    holdings.push({ code: code, name: name || code, shares: shares, cost: cost, target: '', stopLoss: '', note: '' });
  }
  savePortfolioData(holdings);
  // also add to watchlist if not there
  ensureInWatchlist(code, name || code);
  // clear form
  document.getElementById('addCode').value = '';
  document.getElementById('addName').value = '';
  document.getElementById('addShares').value = '';
  document.getElementById('addCost').value = '';
  loadAdminData();
  showToast('✅ 已新增 ' + code);
}

function removeHolding(i) {
  var holdings = getPortfolio();
  var removed = holdings.splice(i, 1);
  savePortfolioData(holdings);
  loadAdminData();
  showToast('已刪除 ' + (removed[0] ? removed[0].code : ''));
}

function updateHolding(i, field, val) {
  var holdings = getPortfolio();
  if (holdings[i]) {
    holdings[i][field] = field === 'note' ? val : (parseFloat(val) || '');
    savePortfolioData(holdings);
  }
}

// ── Watchlist ──
function getEffectiveWatchlist() {
  var saved = getWatchlist();
  if (saved) return saved;
  return STOCK_INDEX.map(function(s){ return { c: s.c, n: s.n }; });
}

function renderWatchlist() {
  var list = getEffectiveWatchlist();
  document.getElementById('wlCount').textContent = list.length + ' 檔';
  var h = '';
  list.forEach(function(s, i){
    h += '<span class="stock-chip">' + s.c + ' ' + s.n + ' <span class="chip-x" onclick="removeFromWatchlist('+i+')">✕</span></span>';
  });
  document.getElementById('watchlistChips').innerHTML = h;
}

function addToWatchlist() {
  var code = document.getElementById('wlCode').value.trim();
  var name = document.getElementById('wlName').value.trim();
  if (!code) { showToast('請輸入股票代號'); return; }
  var list = getEffectiveWatchlist();
  if (list.some(function(s){ return s.c === code; })) { showToast(code + ' 已在清單中'); return; }
  list.push({ c: code, n: name || code });
  saveWatchlistData(list);
  applyWatchlistToIndex(list);
  document.getElementById('wlCode').value = '';
  document.getElementById('wlName').value = '';
  renderWatchlist();
  showToast('✅ 已加入 ' + code);
}

function removeFromWatchlist(i) {
  var list = getEffectiveWatchlist();
  var removed = list.splice(i, 1);
  saveWatchlistData(list);
  applyWatchlistToIndex(list);
  renderWatchlist();
  showToast('已移除 ' + (removed[0] ? removed[0].c : ''));
}

function ensureInWatchlist(code, name) {
  var list = getEffectiveWatchlist();
  if (!list.some(function(s){ return s.c === code; })) {
    list.push({ c: code, n: name });
    saveWatchlistData(list);
    applyWatchlistToIndex(list);
  }
}

function applyWatchlistToIndex(list) {
  // rebuild STOCK_INDEX from watchlist + preserve existing scores
  var oldIndex = {};
  STOCK_INDEX.forEach(function(s){ oldIndex[s.c] = s; });
  STOCK_INDEX = list.map(function(item){
    if (oldIndex[item.c]) return oldIndex[item.c];
    return { c: item.c, n: item.n, s: 5, a: 'action-hold' };
  });
  renderSidebar();
}

// ── Profile ──
function loadProfileForm() {
  var p = getProfile();
  if (p.capital) document.getElementById('profCapital').value = p.capital;
  if (p.monthly) document.getElementById('profMonthly').value = p.monthly;
  if (p.goal) document.getElementById('profGoal').value = p.goal;
  if (p.drawdown) document.getElementById('profDrawdown').value = p.drawdown;
  if (p.cashNeed) document.getElementById('profCashNeed').value = p.cashNeed;
  if (p.experience) document.getElementById('profExp').value = p.experience;
  if (p.cooldown) document.getElementById('profCooldown').value = p.cooldown;
  if (p.maxTrades) document.getElementById('profMaxTrades').value = p.maxTrades;
  document.getElementById('profHideCost').checked = !!p.hideCost;
}

function saveProfile() {
  var p = {
    capital: parseFloat(document.getElementById('profCapital').value) || 0,
    monthly: parseFloat(document.getElementById('profMonthly').value) || 0,
    goal: document.getElementById('profGoal').value,
    drawdown: parseFloat(document.getElementById('profDrawdown').value) || 15,
    cashNeed: parseFloat(document.getElementById('profCashNeed').value) || 6,
    experience: document.getElementById('profExp').value,
    cooldown: parseFloat(document.getElementById('profCooldown').value) || 48,
    maxTrades: parseFloat(document.getElementById('profMaxTrades').value) || 10,
    hideCost: document.getElementById('profHideCost').checked
  };
  localStorage.setItem('mm_profile', JSON.stringify(p));
  document.getElementById('profileSaved').style.display = 'inline';
  setTimeout(function(){ document.getElementById('profileSaved').style.display = 'none'; }, 2000);
  renderAssetOverview();
  renderHoldings();
  showToast('✅ 投資檔案已儲存');
}

// ── Risk Lights ──
function renderRiskLights() {
  var holdings = getPortfolio();
  var profile = getProfile();
  var totalCost = 0, totalMarket = 0;
  var maxSingle = 0;
  holdings.forEach(function(h){
    var cost = (h.cost||0) * (h.shares||0);
    var market = (h.currentPrice || h.cost || 0) * (h.shares || 0);
    totalCost += cost;
    totalMarket += market;
    if (market > maxSingle) maxSingle = market;
  });
  var totalAssets = (profile.capital || 0) * 10000;
  if (totalAssets <= 0) totalAssets = totalCost || 1;
  var cashRatio = totalAssets > 0 ? ((totalAssets - totalCost) / totalAssets * 100) : 100;
  var singleConc = totalMarket > 0 ? (maxSingle / totalMarket * 100) : 0;

  var lights = '';
  // 現金水位
  var cashLight = cashRatio >= 30 ? 'risk-green' : (cashRatio >= 15 ? 'risk-amber' : 'risk-red');
  lights += '<div><span class="risk-light '+cashLight+'"></span>現金水位：' + cashRatio.toFixed(0) + '% ' + (cashRatio<15?'⚠️ 偏低':'') + '</div>';
  // 單一持股集中度
  var concLight = singleConc <= 25 ? 'risk-green' : (singleConc <= 40 ? 'risk-amber' : 'risk-red');
  lights += '<div><span class="risk-light '+concLight+'"></span>單一持股集中：' + singleConc.toFixed(0) + '% ' + (singleConc>40?'⚠️ 過度集中':'') + '</div>';
  // 持股數量
  var countLight = holdings.length <= 10 ? 'risk-green' : (holdings.length <= 20 ? 'risk-amber' : 'risk-red');
  lights += '<div><span class="risk-light '+countLight+'"></span>持股檔數：' + holdings.length + ' 檔 ' + (holdings.length>20?'⚠️ 過度分散':'') + '</div>';
  // 總損益
  var pl = totalMarket - totalCost;
  var plPct = totalCost > 0 ? (pl/totalCost*100) : 0;
  var plLight = plPct >= 0 ? 'risk-green' : (plPct > -10 ? 'risk-amber' : 'risk-red');
  lights += '<div><span class="risk-light '+plLight+'"></span>總損益：' + (plPct>=0?'+':'') + plPct.toFixed(1) + '%</div>';

  document.getElementById('riskLights').innerHTML = lights;

  // Holdings diagnosis
  var diag = '';
  if (holdings.length === 0) { diag = '尚無持股'; }
  else {
    holdings.forEach(function(h){
      var icon = '🟢';
      var notes = [];
      if (h.stopLoss && h.currentPrice && h.currentPrice <= h.stopLoss) { icon = '🔴'; notes.push('已觸及停損'); }
      if (h.target && h.currentPrice && h.currentPrice >= h.target) { icon = '🟡'; notes.push('已達目標價'); }
      if (!h.stopLoss) notes.push('未設停損');
      if (!h.target) notes.push('未設目標價');
      diag += '<div style="padding:4px 0;">' + icon + ' <strong>' + h.code + '</strong> ' + h.name + ' — ' + (notes.length ? notes.join('、') : '正常') + '</div>';
    });
  }
  document.getElementById('holdingsDiag').innerHTML = diag;
}

// ── Init: apply saved watchlist on load ──
(function(){
  var saved = getWatchlist();
  if (saved && saved.length > 0) {
    applyWatchlistToIndex(saved);
  }
})();
</script>
