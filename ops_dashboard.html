<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>喵姆看盤 — 每日任務面板</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0b0f14; --bg2: #131922; --bg3: #1a2230;
  --gold: #f5c842; --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
  --blue: #3b82f6; --purple: #a78bfa; --cyan: #22d3ee;
  --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
  --border: #1e293b;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; min-height: 100vh; }

/* ── Header ── */
.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.header-left { display: flex; align-items: center; gap: 12px; }
.logo { font-size: 20px; font-weight: 700; color: var(--gold); letter-spacing: 0.15em; }
.logo small { font-size: 11px; opacity: 0.6; letter-spacing: 0; margin-left: 4px; }
.header-date { color: var(--text2); font-size: 14px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.health-badge { padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 15px; }
.health-A { background: #22c55e22; color: var(--green); border: 1px solid #22c55e44; }
.health-B { background: #3b82f622; color: var(--blue); border: 1px solid #3b82f644; }
.health-C { background: #f59e0b22; color: var(--amber); border: 1px solid #f59e0b44; }
.health-D { background: #ef444422; color: var(--red); border: 1px solid #ef444444; }
.health-F { background: #ef444422; color: var(--red); border: 1px solid #ef444444; }

/* ── Progress bar ── */
.progress-wrap { padding: 12px 24px; background: var(--bg2); border-bottom: 1px solid var(--border); }
.progress-bar-outer { background: var(--bg3); border-radius: 8px; height: 10px; overflow: hidden; }
.progress-bar-inner { height: 100%; background: linear-gradient(90deg, var(--gold), var(--green)); border-radius: 8px; transition: width 0.5s ease; }
.progress-text { display: flex; justify-content: space-between; margin-top: 6px; font-size: 13px; color: var(--text2); }

/* ── Main layout ── */
.main { display: flex; gap: 0; min-height: calc(100vh - 120px); }
.col-tasks { flex: 1; padding: 20px 24px; overflow-y: auto; border-right: 1px solid var(--border); }
.col-status { width: 380px; padding: 20px 24px; overflow-y: auto; flex-shrink: 0; }

/* ── Phase block ── */
.phase { margin-bottom: 24px; }
.phase-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; cursor: pointer; }
.phase-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; }
.phase-0 .phase-icon { background: #ef444422; color: var(--red); }
.phase-1 .phase-icon { background: #3b82f622; color: var(--blue); }
.phase-2 .phase-icon { background: #a78bfa22; color: var(--purple); }
.phase-3 .phase-icon { background: #22d3ee22; color: var(--cyan); }
.phase-4 .phase-icon { background: #f5c84222; color: var(--gold); }
.phase-title { font-size: 16px; font-weight: 600; }
.phase-count { font-size: 12px; color: var(--text3); margin-left: auto; }

/* ── Task item ── */
.task { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; margin-bottom: 6px; background: var(--bg2); border-radius: 10px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
.task:hover { border-color: var(--gold); background: var(--bg3); }
.task.done { opacity: 0.5; }
.task.done .task-text { text-decoration: line-through; }
.task.active { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }

.task-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--text3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; transition: all 0.2s; font-size: 13px; }
.task.done .task-check { background: var(--green); border-color: var(--green); color: #fff; }
.task-body { flex: 1; min-width: 0; }
.task-text { font-size: 14px; line-height: 1.5; }
.task-hint { font-size: 12px; color: var(--text3); margin-top: 4px; line-height: 1.4; }
.task-cmd { font-family: "SF Mono", "Fira Code", monospace; font-size: 11px; background: var(--bg); padding: 6px 10px; border-radius: 6px; margin-top: 6px; color: var(--amber); cursor: pointer; border: 1px solid var(--border); display: inline-block; }
.task-cmd:hover { background: var(--bg3); }

.task-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; margin-left: 8px; white-space: nowrap; }
.tag-auto { background: #22c55e22; color: var(--green); }
.tag-manual { background: #f59e0b22; color: var(--amber); }
.tag-critical { background: #ef444422; color: var(--red); }

/* ── Status panel ── */
.status-section { margin-bottom: 20px; }
.status-title { font-size: 14px; font-weight: 600; color: var(--text2); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.status-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; margin-bottom: 4px; background: var(--bg2); border-radius: 8px; font-size: 13px; border: 1px solid var(--border); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-ok { background: var(--green); }
.dot-fail { background: var(--red); }
.dot-warn { background: var(--amber); }
.status-label { flex: 1; color: var(--text2); }
.status-value { font-weight: 600; font-size: 12px; }

/* ── Alerts ── */
.alert-box { background: #ef444415; border: 1px solid #ef444444; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; }
.alert-title { color: var(--red); font-weight: 700; font-size: 14px; margin-bottom: 6px; }
.alert-text { color: var(--text2); font-size: 13px; line-height: 1.5; }

/* ── Completion ── */
.completion-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
.completion-overlay.show { display: flex; }
.completion-card { background: var(--bg2); border: 2px solid var(--gold); border-radius: 20px; padding: 40px; text-align: center; max-width: 400px; }
.completion-cat { font-size: 64px; margin-bottom: 16px; }
.completion-title { font-size: 24px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
.completion-sub { color: var(--text2); font-size: 15px; }

/* ── Btn ── */
.btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.2s; }
.btn:hover { border-color: var(--gold); }
.btn-gold { background: var(--gold); color: var(--bg); font-weight: 600; border: none; }
.btn-gold:hover { background: #e5b832; }

/* ── Copy toast ── */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--green); color: #fff; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; }
.toast.show { opacity: 1; }

/* ── Responsive ── */
@media (max-width: 900px) {
  .main { flex-direction: column; }
  .col-status { width: 100%; border-right: none; border-top: 1px solid var(--border); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">喵 姆<small>OPS</small></div>
    <div class="header-date" id="dateDisplay"></div>
  </div>
  <div class="header-right">
    <div class="health-badge health-C" id="healthBadge">--</div>
    <button class="btn" onclick="runHealthCheck()">🔄 執行體檢</button>
    <button class="btn btn-gold" onclick="copyReport()">📋 複製報告</button>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width:0%"></div></div>
  <div class="progress-text">
    <span id="progressLabel">0 / 0 完成</span>
    <span id="progressPct">0%</span>
  </div>
</div>

<div class="main">
  <div class="col-tasks" id="taskCol"></div>
  <div class="col-status" id="statusCol"></div>
</div>

<div class="completion-overlay" id="completionOverlay">
  <div class="completion-card">
    <div class="completion-cat">😺</div>
    <div class="completion-title">今日任務全部完成！</div>
    <div class="completion-sub">辛苦了 Kirin，喵姆系統一切正常～</div>
    <br>
    <button class="btn btn-gold" onclick="document.getElementById('completionOverlay').classList.remove('show')">好的，收工！</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Task definitions ──
var PHASES = [
  {
    id: 'geopolitical', title: '🌍 地緣風險掃描', color: 'phase-0',
    tasks: [
      { id: 'geo_scan', text: '掃描今日重大地緣政治事件', hint: '查看國際新聞：戰爭、制裁、能源、央行政策', tag: 'manual' },
      { id: 'geo_assess', text: '評估對台股/持股的影響等級', hint: '用喵姆地緣政治引擎比對歷史案例，產出相似度評分', tag: 'manual' },
      { id: 'geo_action', text: '記錄今日地緣風險結論', hint: '結論：持有/加碼/減碼/觀望 → 貼給 Claude 或記在 DEVLOG', tag: 'manual' },
    ]
  },
  {
    id: 'morning', title: '☀️ 開盤前檢查', color: 'phase-1',
    tasks: [
      { id: 'check_data', text: '確認今日資料已更新', hint: 'daily_analysis.json 的 generated_at 應該是今天', tag: 'auto', autoCheck: 'data_fresh' },
      { id: 'check_cron', text: '確認 cron 最後成功執行', hint: '查看 logs/cron.log 最後一行', tag: 'auto', autoCheck: 'cron_ok' },
      { id: 'check_logs', text: '掃描日誌有無新錯誤', hint: '檢查 run_night.log / run_day.log', tag: 'auto', autoCheck: 'logs_clean' },
    ]
  },
  {
    id: 'quality', title: '🔍 品質驗證', color: 'phase-2',
    tasks: [
      { id: 'test_stock', text: '載入一檔股票，確認 AI 信心分數正常', hint: '打開 index.html → 選一檔股票 → 信心分數應顯示數字', tag: 'manual' },
      { id: 'test_backtest', text: '確認回測面板顯示數據', hint: '展開「回測績效」→ 應有策略結果', tag: 'manual' },
      { id: 'test_committee', text: '確認 AI 委員會面板正常', hint: '點委員會按鈕 → 5 位角色應有輸出', tag: 'manual' },
      { id: 'test_sector', text: '確認產業標籤顯示正確', hint: '股票資訊列應顯示彩色產業 pill', tag: 'manual' },
    ]
  },
  {
    id: 'dev', title: '⚡ 開發 & 部署', color: 'phase-3',
    tasks: [
      { id: 'check_git', text: '檢查有無未提交的變更', hint: '', cmd: 'cd ~/stock_analyzer && git status', tag: 'auto', autoCheck: 'git_clean' },
      { id: 'check_push', text: '確認所有 commit 已推送', hint: '', cmd: 'cd ~/stock_analyzer && git log origin/main..HEAD --oneline', tag: 'auto', autoCheck: 'git_pushed' },
      { id: 'update_devlog', text: '如有變更，更新 DEVLOG.md', hint: '記錄今天做了什麼改動', tag: 'manual' },
    ]
  },
  {
    id: 'night', title: '🌙 收盤後', color: 'phase-4',
    tasks: [
      { id: 'run_health', text: '執行每日體檢腳本', hint: '體檢結果會顯示在右側', cmd: 'cd ~/stock_analyzer && python3 scripts/daily_health_check.py', tag: 'auto' },
      { id: 'review_report', text: '查看體檢報告，記下異常', hint: '右側面板會顯示最新狀態', tag: 'manual' },
      { id: 'send_claude', text: '把報告貼給 Claude 網頁版分析', hint: '點右上「複製報告」按鈕 → 貼到 claude.ai', tag: 'manual' },
    ]
  }
];

// ── State ──
var taskStates = {};
var healthData = null;

function init() {
  // Date
  var now = new Date();
  var weekday = ['日','一','二','三','四','五','六'][now.getDay()];
  document.getElementById('dateDisplay').textContent =
    now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + '（' + weekday + '）';

  // Load saved state for today
  var key = 'meowmu_ops_' + now.toISOString().slice(0,10);
  try { taskStates = JSON.parse(localStorage.getItem(key)) || {}; } catch(e) { taskStates = {}; }

  renderTasks();
  loadHealthData();
  updateProgress();
}

function saveState() {
  var now = new Date();
  var key = 'meowmu_ops_' + now.toISOString().slice(0,10);
  localStorage.setItem(key, JSON.stringify(taskStates));
}

function toggleTask(id) {
  taskStates[id] = !taskStates[id];
  saveState();
  renderTasks();
  updateProgress();

  // Check completion
  var total = 0, done = 0;
  PHASES.forEach(function(p) { p.tasks.forEach(function(t) { total++; if (taskStates[t.id]) done++; }); });
  if (done === total) {
    setTimeout(function() { document.getElementById('completionOverlay').classList.add('show'); }, 500);
  }
}

function renderTasks() {
  var html = '';
  // Find first unchecked for active highlight
  var firstUndone = null;
  PHASES.forEach(function(p) { p.tasks.forEach(function(t) { if (!taskStates[t.id] && !firstUndone) firstUndone = t.id; }); });

  PHASES.forEach(function(phase) {
    var pDone = phase.tasks.filter(function(t) { return taskStates[t.id]; }).length;
    html += '<div class="phase ' + phase.color + '">';
    html += '<div class="phase-header"><div class="phase-icon">' + (pDone === phase.tasks.length ? '✓' : (PHASES.indexOf(phase)+1)) + '</div>';
    html += '<div class="phase-title">' + phase.title + '</div>';
    html += '<div class="phase-count">' + pDone + ' / ' + phase.tasks.length + '</div></div>';

    phase.tasks.forEach(function(task) {
      var done = taskStates[task.id];
      var isActive = task.id === firstUndone;
      html += '<div class="task' + (done ? ' done' : '') + (isActive ? ' active' : '') + '" onclick="toggleTask(\'' + task.id + '\')">';
      html += '<div class="task-check">' + (done ? '✓' : '') + '</div>';
      html += '<div class="task-body">';
      html += '<div class="task-text">' + task.text;
      if (task.tag === 'auto') html += '<span class="task-tag tag-auto">自動</span>';
      else if (task.tag === 'manual') html += '<span class="task-tag tag-manual">手動</span>';
      html += '</div>';
      if (task.hint) html += '<div class="task-hint">' + task.hint + '</div>';
      if (task.cmd) html += '<div class="task-cmd" onclick="event.stopPropagation();copyCmd(\'' + task.cmd.replace(/'/g, "\\'") + '\')">' + task.cmd + ' 📋</div>';
      html += '</div></div>';
    });
    html += '</div>';
  });

  document.getElementById('taskCol').innerHTML = html;
}

function updateProgress() {
  var total = 0, done = 0;
  PHASES.forEach(function(p) { p.tasks.forEach(function(t) { total++; if (taskStates[t.id]) done++; }); });
  var pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = done + ' / ' + total + ' 完成';
  document.getElementById('progressPct').textContent = pct + '%';
}

// ── Health data ──
function loadHealthData() {
  // Try loading from reports/health_latest.json
  fetch('reports/health_latest.json')
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(data) {
      if (data) { healthData = data; renderStatus(); autoCheckTasks(); }
      else { renderStatusFallback(); }
    })
    .catch(function() { renderStatusFallback(); });
}

function autoCheckTasks() {
  if (!healthData) return;
  var items = [];
  healthData.sections.forEach(function(s) { s.items.forEach(function(i) { items.push(i); }); });

  // Auto-verify tasks based on health data
  var checks = {
    data_fresh: function() { var d = items.find(function(i) { return i.item.includes('daily_analysis'); }); return d && d.status === true; },
    cron_ok: function() { var d = items.find(function(i) { return i.item.includes('cron'); }); return d && d.status === true; },
    logs_clean: function() { var d = items.find(function(i) { return i.item.includes('日誌'); }); return d && d.status === true; },
    git_clean: function() { var d = items.find(function(i) { return i.item.includes('未提交'); }); return d && d.status === true; },
    git_pushed: function() { var d = items.find(function(i) { return i.item.includes('未推送'); }); return d && d.status === true; },
  };

  // Update task hints with live data
  PHASES.forEach(function(p) {
    p.tasks.forEach(function(t) {
      if (t.autoCheck && checks[t.autoCheck]) {
        var ok = checks[t.autoCheck]();
        if (ok) {
          taskStates[t.id] = true;
          t.hint = '✅ 自動驗證通過';
        } else {
          t.hint = '❌ 自動驗證失敗 — 需要處理';
        }
      }
    });
  });
  saveState();
  renderTasks();
  updateProgress();
}

function renderStatus() {
  if (!healthData) return;
  var html = '';

  // Health badge
  var badge = document.getElementById('healthBadge');
  badge.textContent = healthData.health_pct + '% ' + healthData.grade;
  badge.className = 'health-badge health-' + healthData.grade;

  // Timestamp
  html += '<div class="status-section"><div class="status-title">📊 體檢時間：' + healthData.timestamp + '</div></div>';

  // Critical alerts
  if (healthData.critical && healthData.critical.length > 0) {
    healthData.critical.forEach(function(c) {
      html += '<div class="alert-box"><div class="alert-title">🚨 ' + c.item + '</div><div class="alert-text">' + c.detail + '</div></div>';
    });
  }

  // Sections
  healthData.sections.forEach(function(section) {
    html += '<div class="status-section"><div class="status-title">' + section.name + '</div>';
    section.items.forEach(function(item) {
      var dot = item.status === true ? 'dot-ok' : item.status === false ? 'dot-fail' : 'dot-warn';
      var icon = item.status === true ? '✅' : item.status === false ? '❌' : '⚠️';
      html += '<div class="status-item"><div class="status-dot ' + dot + '"></div>';
      html += '<div class="status-label">' + item.item + '</div>';
      html += '<div class="status-value">' + icon + '</div></div>';
    });
    html += '</div>';
  });

  document.getElementById('statusCol').innerHTML = html;
}

function renderStatusFallback() {
  document.getElementById('statusCol').innerHTML =
    '<div class="status-section">' +
    '<div class="status-title">📊 系統狀態</div>' +
    '<div style="color:var(--text3);font-size:13px;padding:20px;text-align:center">' +
    '尚無體檢資料<br><br>' +
    '請先執行體檢腳本：<br>' +
    '<div class="task-cmd" style="margin-top:8px" onclick="copyCmd(\'cd ~/stock_analyzer && python3 scripts/daily_health_check.py\')">python3 scripts/daily_health_check.py 📋</div>' +
    '<br><br>或點右上「🔄 執行體檢」按鈕' +
    '</div></div>';
}

// ── Actions ──
function runHealthCheck() {
  showToast('請在終端機執行：python3 scripts/daily_health_check.py');
  copyCmd('cd ~/stock_analyzer && python3 scripts/daily_health_check.py');
  setTimeout(function() { showToast('指令已複製！執行後重新整理此頁面'); }, 1500);
}

function copyReport() {
  fetch('reports/health_latest.md')
    .then(function(r) { return r.ok ? r.text() : null; })
    .then(function(text) {
      // Build full report with geopolitical scan status
      var report = '';
      // Add geo status header
      var geoPhase = PHASES.find(function(p) { return p.id === 'geopolitical'; });
      if (geoPhase) {
        var geoDone = geoPhase.tasks.filter(function(t) { return taskStates[t.id]; }).length;
        report += '## 🌍 今日地緣風險掃描\n';
        report += '狀態：' + geoDone + '/' + geoPhase.tasks.length + ' 完成\n';
        geoPhase.tasks.forEach(function(t) {
          report += (taskStates[t.id] ? '✅' : '⬜') + ' ' + t.text + '\n';
        });
        report += '\n---\n\n';
      }
      // Add ops progress
      var total = 0, done = 0;
      PHASES.forEach(function(p) { p.tasks.forEach(function(t) { total++; if (taskStates[t.id]) done++; }); });
      report += '## 📋 每日任務進度：' + done + '/' + total + ' (' + Math.round(done/total*100) + '%)\n\n';
      // Add health report
      if (text) {
        report += text;
      } else {
        report += '（尚無體檢資料）\n';
      }
      navigator.clipboard.writeText(report).then(function() { showToast('✅ 完整報告已複製（含地緣風險掃描 + 任務進度 + 體檢）'); });
    })
    .catch(function() { showToast('❌ 無法讀取報告'); });
}

function copyCmd(cmd) {
  navigator.clipboard.writeText(cmd).then(function() { showToast('📋 指令已複製：' + cmd); });
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// ── Init ──
init();
</script>
</body>
</html>
