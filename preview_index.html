<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>金姆看盤情報 V32</title>
  <meta http-equiv="cache-control" content="no-cache">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273548;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --green-hi: #16a34a;
      --green-lo: #22c55e;
      --yellow: #f59e0b;
      --red-lo: #ef4444;
      --red-hi: #dc2626;
      --blue: #3b82f6;
      --radius: 14px
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "Noto Sans TC", sans-serif;
      height: 100vh;
      overflow: hidden;
      zoom: 1.15
    }

    /* Hero */
    .hero-banner {
      padding: 6px 14px;
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 10px
    }

    .hero-left {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .hero-cat {
      width: 32px;
      height: 32px;
      filter: drop-shadow(0 4px 16px rgba(255, 215, 0, .5));
      animation: cb 2s ease-in-out infinite;
      flex-shrink: 0
    }

    @keyframes cb {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-5px)
      }
    }

    .hero-ingot {
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(135deg, #ffd700, #f59e0b, #daa520);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px
    }

    .hero-ver-badge {
      font-size: 9px;
      font-weight: 700;
      color: #fbbf24;
      background: rgba(251, 191, 36, .12);
      border: 1px solid rgba(251, 191, 36, .35);
      padding: 2px 7px;
      border-radius: 20px
    }

    .hero-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .hero-date {
      font-size: 11px;
      color: #fbbf24;
      font-weight: 700
    }

    /* Legend */
    .legend-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 6px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--muted)
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%
    }

    /* === MASTER-DETAIL === */
    .master-detail {
      display: flex;
      gap: 12px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 14px;
      height: calc(100vh - 52px)
    }

    .detail-panel {
      flex: 3;
      overflow-y: auto;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent
    }

    .detail-panel::-webkit-scrollbar {
      width: 6px
    }

    .detail-panel::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px
    }

    .stock-list-wrap {
      flex: 2;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden
    }

    .list-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0
    }

    .stock-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      scrollbar-width: thin;
      scrollbar-color: var(--blue) transparent
    }

    .stock-list::-webkit-scrollbar {
      width: 10px
    }

    .stock-list::-webkit-scrollbar-thumb {
      background: var(--blue);
      border-radius: 5px;
      border: 2px solid var(--surface)
    }

    .stock-list::-webkit-scrollbar-track {
      background: rgba(59, 130, 246, .06);
      border-radius: 5px
    }

    /* List Row */
    .list-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      background: var(--bg);
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s cubic-bezier(.4,0,.2,1);
      flex-shrink: 0;
      border: 1px solid transparent;
      position: relative
    }

    .list-row:hover {
      background: var(--surface2);
      border-color: rgba(59, 130, 246, .5);
      transform: translateX(-3px);
      box-shadow: 4px 0 12px rgba(59,130,246,.15)
    }

    .list-row:hover .list-name {
      color: #fff
    }

    .list-row:hover .list-score {
      transform: scale(1.15);
      transition: transform .2s
    }

    .list-row:active {
      transform: translateX(-1px) scale(.98);
      transition: all .08s
    }

    .list-row.active {
      background: rgba(59, 130, 246, .15);
      border-color: var(--blue);
      box-shadow: inset 3px 0 0 var(--blue), 0 0 16px rgba(59,130,246,.1)
    }

    .list-icon {
      font-size: 14px;
      flex-shrink: 0;
      width: 20px;
      text-align: center
    }

    .list-left {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 6px
    }

    .list-name {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .list-code {
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0
    }

    .list-right {
      text-align: right;
      flex-shrink: 0
    }

    .list-price {
      font-size: 14px;
      font-weight: 800;
      font-variant-numeric: tabular-nums
    }

    .list-change {
      font-size: 11px;
      font-weight: 700
    }

    .list-change.up {
      color: var(--red-lo)
    }

    .list-change.down {
      color: var(--green-lo)
    }

    .list-score {
      font-size: 14px;
      font-weight: 800;
      min-width: 32px;
      text-align: center;
      padding: 3px 6px;
      border-radius: 6px;
      transition: transform .2s
    }

    /* Detail Header */
    .detail-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 10;
      border-radius: var(--radius) var(--radius) 0 0
    }

    .detail-header .stock-name {
      font-size: 26px;
      font-weight: 800
    }

    .detail-header .stock-code {
      font-size: 14px;
      color: var(--muted);
      margin-top: 2px
    }

    .detail-price-block {
      text-align: right;
      margin-left: auto
    }

    .detail-price-block .price {
      font-size: 26px;
      font-weight: 800;
      font-variant-numeric: tabular-nums
    }

    .detail-price-block .change {
      font-size: 14px;
      font-weight: 700;
      margin-top: 2px
    }

    .change.up {
      color: var(--red-lo)
    }

    .change.down {
      color: var(--green-lo)
    }

    /* Verdict */
    .verdict-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 14px;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      border: 1px solid transparent;
      transition: all .25s;
      cursor: default
    }

    .verdict-pill:hover {
      transform: scale(1.06);
      box-shadow: 0 0 14px rgba(255,255,255,.08)
    }

    .verdict-pill.buy-strong {
      background: rgba(22, 163, 74, .2);
      color: #4ade80;
      border-color: var(--green-hi)
    }

    .verdict-pill.buy {
      background: rgba(34, 197, 94, .15);
      color: #4ade80;
      border-color: var(--green-lo)
    }

    .verdict-pill.hold {
      background: rgba(245, 158, 11, .15);
      color: #fbbf24;
      border-color: var(--yellow)
    }

    .verdict-pill.sell {
      background: rgba(239, 68, 68, .15);
      color: #f87171;
      border-color: var(--red-lo)
    }

    .verdict-pill.stoploss {
      background: rgba(220, 38, 38, .2);
      color: #f87171;
      border-color: var(--red-hi);
      animation: pulse 1.2s infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .65
      }
    }

    .verdict-detail {
      padding: 8px 16px 6px
    }

    .prob-row {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .prob-pct {
      font-size: 13px;
      font-weight: 800;
      min-width: 36px
    }

    .bull-pct {
      color: var(--red-lo);
      text-align: right
    }

    .bear-pct {
      color: var(--green-lo)
    }

    .prob-bar {
      flex: 1;
      height: 12px;
      border-radius: 99px;
      background: var(--border);
      overflow: hidden;
      display: flex
    }

    .prob-fill {
      height: 100%
    }

    .prob-fill.bull {
      background: linear-gradient(90deg, #16a34a, #22c55e);
      border-radius: 99px 0 0 99px
    }

    .prob-fill.bear-fill {
      background: linear-gradient(90deg, #ef4444, #dc2626);
      border-radius: 0 99px 99px 0
    }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border)
    }

    .stat {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 14px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transition: background .2s;
      cursor: help
    }

    .stat:hover {
      background: rgba(59,130,246,.06)
    }

    .stat:hover .stat-value {
      transform: scale(1.08);
      transition: transform .2s
    }

    .stat:nth-child(2n) {
      border-right: none
    }

    .stat:nth-last-child(-n+2) {
      border-bottom: none
    }

    .stat-label {
      font-size: 14px;
      color: var(--muted);
      font-weight: 600
    }

    .stat-value {
      font-size: 18px;
      font-weight: 800
    }

    .stat-value.red {
      color: var(--red-lo)
    }

    .stat-value.green {
      color: var(--green-lo)
    }

    .stat-value.amber {
      color: var(--yellow)
    }

    .stoploss-alert {
      margin: 8px 16px;
      padding: 9px 13px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6
    }

    .stoploss-alert.danger {
      background: rgba(220, 38, 38, .15);
      border: 1px solid var(--red-hi);
      color: #fca5a5
    }

    .stoploss-alert.warning {
      background: rgba(245, 158, 11, .1);
      border: 1px solid var(--yellow);
      color: #fcd34d
    }

    /* Tabs */
    .expand-tabs {
      display: flex;
      border-top: 1px solid var(--border)
    }

    .tab-btn {
      flex: 1;
      padding: 8px 2px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all .18s;
      -webkit-tap-highlight-color: transparent
    }

    .tab-btn.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
      background: rgba(59,130,246,.06)
    }

    .tab-btn:hover {
      color: var(--text);
      background: rgba(255,255,255,.04);
      border-bottom-color: rgba(255,255,255,.2)
    }

    .tab-panels {
      overflow: hidden
    }

    .tab-panel {
      display: none;
      padding: 14px 16px
    }

    .tab-panel.active {
      display: block
    }

    .section-title {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px
    }

    .chip {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 99px;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      cursor: help;
      position: relative;
      transition: all .2s
    }

    .chip:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(0,0,0,.3);
      filter: brightness(1.2)
    }

    .chip.pos {
      background: rgba(34, 197, 94, .1);
      color: var(--green-lo);
      border-color: var(--green-hi)
    }

    .chip.neg {
      background: rgba(239, 68, 68, .1);
      color: var(--red-lo);
      border-color: var(--red-lo)
    }

    .chip.neu {
      background: rgba(245, 158, 11, .08);
      color: var(--yellow);
      border-color: var(--yellow)
    }

    .ai-votes {
      display: flex;
      flex-direction: column;
      gap: 7px
    }

    .ai-vote-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      margin-bottom: 10px
    }

    .ai-name {
      width: 56px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600
    }

    .vote-bar-wrap {
      flex: 1;
      height: 10px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden
    }

    .vote-bar {
      height: 100%;
      border-radius: 99px;
      transition: width .8s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 6px rgba(255,255,255,.1)
    }

    .vote-pct {
      width: 36px;
      text-align: right;
      font-weight: 800;
      font-size: 14px
    }

    .radar-wrap {
      display: flex;
      justify-content: center;
      padding: 10px 0
    }

    .score-grid {
      display: flex;
      justify-content: space-around;
      margin-top: 12px
    }

    .score-item {
      text-align: center
    }

    .score-item-label {
      font-size: 10px;
      color: var(--muted)
    }

    .score-item-val {
      font-size: 16px;
      font-weight: 800;
      margin-top: 2px
    }

    .score-note {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
      line-height: 1.5
    }

    .kelly-bar-wrap {
      padding: 12px;
      background: var(--surface2);
      border-radius: 10px;
      margin: 8px 16px
    }

    .kelly-bar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 12px
    }

    .kelly-track {
      height: 12px;
      background: rgba(71, 85, 105, .4);
      border-radius: 99px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 1px 3px rgba(0,0,0,.3)
    }

    .kelly-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 1s cubic-bezier(.4,0,.2,1);
      background: linear-gradient(90deg, #06b6d4, #3b82f6, #8b5cf6);
      box-shadow: 0 0 8px rgba(59,130,246,.4)
    }

    .kelly-ticks {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px
    }

    .info-list {
      font-size: 14px
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 255, 255, .04)
    }

    .info-row:last-child {
      border-bottom: none
    }

    .info-label {
      color: var(--muted)
    }

    .info-val {
      font-family: monospace;
      font-weight: 700;
      font-size: 16px
    }

    .lc-wrap {
      width: 100%;
      height: 220px;
      border-radius: 8px;
      overflow: hidden;
      background: transparent
    }

    .mini-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 70px
    }

    .mini-bar-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 0
    }

    .mini-bar-item .bar-label {
      font-size: 9px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%
    }

    .mini-bar-item .bar-val {
      font-size: 9px;
      color: #cbd5e1
    }

    .learn-popup {
      display: none;
      position: fixed;
      z-index: 200;
      max-width: 300px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid rgba(59,130,246,.3);
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, .7), 0 0 20px rgba(59,130,246,.1);
      font-size: 13px;
      color: #e2e8f0;
      line-height: 1.7;
      white-space: pre-line;
      pointer-events: none;
      backdrop-filter: blur(8px);
      transform: translateY(4px);
      opacity: 0;
      transition: opacity .2s, transform .2s
    }

    .learn-popup.show {
      display: block;
      opacity: 1;
      transform: translateY(0)
    }

    .learn-popup::before {
      content: "📖 新手教學";
      font-size: 11px;
      display: block;
      color: var(--blue);
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: .5px
    }

    /* Entrance animation */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(12px) }
      to { opacity: 1; transform: translateX(0) }
    }

    .list-row {
      animation: slideIn .3s ease both
    }

    /* Detail panel fade-in */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px) }
      to { opacity: 1; transform: translateY(0) }
    }

    .detail-header,
    .verdict-detail,
    .stats-row,
    .kelly-bar-wrap,
    .tab-panel.active {
      animation: fadeUp .35s ease both
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 10px;
      padding: 6px 16px;
      line-height: 1.5;
      flex-shrink: 0
    }

    /* === MOBILE === */
    @media(max-width:599px) {
      .hero-banner {
        padding: 4px 8px
      }

      .hero-cat {
        width: 26px;
        height: 26px
      }

      .hero-ingot {
        font-size: 18px
      }

      .legend-row {
        gap: 4px;
        padding: 4px 10px
      }

      .legend-item {
        font-size: 9px
      }

      .master-detail {
        flex-direction: column;
        height: calc(100vh - 42px);
        gap: 0;
        padding: 0 6px
      }

      .detail-panel {
        flex: 3;
        border-radius: var(--radius) var(--radius) 0 0;
        min-height: 0
      }

      .stock-list-wrap {
        flex: 2;
        border-radius: 0 0 var(--radius) var(--radius);
        border-top: 2px solid var(--blue);
        min-height: 0
      }

      .stock-list::-webkit-scrollbar {
        width: 16px
      }

      .stock-list::-webkit-scrollbar-thumb {
        background: var(--blue);
        border-radius: 8px;
        border: 3px solid var(--surface);
        min-height: 50px
      }

      .list-row {
        padding: 7px 8px;
        gap: 6px
      }

      .list-name {
        font-size: 12px
      }

      .list-price {
        font-size: 11px
      }

      .detail-header {
        padding: 10px 14px
      }

      .detail-header .stock-name {
        font-size: 15px
      }

      .detail-price-block .price {
        font-size: 16px
      }

      .tab-btn {
        font-size: 10px;
        padding: 7px 2px
      }

      .kelly-bar-wrap {
        margin: 8px 10px
      }
    }

    @media(min-width:600px)and(max-width:1079px) {
      .detail-panel {
        flex: 3
      }

      .stock-list-wrap {
        flex: 2
      }
    }
  </style>
</head>

<body>
  <header class="hero-banner">
    <div class="hero-left">
      <img src="static/jinmu-cat.png" class="hero-cat" alt="金姆招財貓" style="object-fit:contain;" />
      <div class="hero-ingot">喵姆</div>
      <div class="hero-ver-badge">V3.0</div>
    </div>
    <div class="hero-right">
      <div class="hero-date">2026年2月28日 (六)</div>
    </div>
  </header>

  <div class="master-detail">
    <div class="detail-panel" id="detail-panel"></div>
    <div class="stock-list-wrap">
      <div class="legend-row">
        <div class="legend-item">
          <div class="dot" style="background:#16a34a"></div>強力買進
        </div>
        <div class="legend-item">
          <div class="dot" style="background:#22c55e"></div>偏多操作

        <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--muted)">📈 趨勢力</span><span style="font-size:16px;font-weight:800;${sClr(aiTech)}">${aiTech}</span></div>
        <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--muted)">⚡ 動能(MACD)</span><span style="font-size:16px;font-weight:800;${sClr(tMacd)}">${Math.round(tMacd)}</span></div>
        <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--muted)">🔄 反轉(RSI)</span><span style="font-size:16px;font-weight:800;${sClr(rsi)}">${Math.round(rsi)}</span></div>
        <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--muted)">💰 基本面力</span><span style="font-size:16px;font-weight:800;${sClr(aiFund)}">${aiFund}</span></div>
        <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:8px;margin-top:4px"><span style="font-size:14px;font-weight:700;color:var(--text)">綜合評分</span><span style="font-size:24px;font-weight:900;${sClr(score * 10)}">${(score * 10).toFixed(0)}</span></div>
      </div>
    </div>
    <!-- 下半：全寬 info-list -->
    <div style="border-top:1px solid var(--border);padding-top:8px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;column-gap:0">
        <style>
          #detail-radar .info-grid-l { padding: 5px 12px 5px 4px; border-right: 1px solid var(--border); border-bottom: 1px solid rgba(255,255,255,.04); display:flex; justify-content:space-between; }
          #detail-radar .info-grid-r { padding: 5px 4px 5px 12px; border-bottom: 1px solid rgba(255,255,255,.04); display:flex; justify-content:space-between; }
        </style>
        <div class="info-grid-l"><span class="info-label">💰 外資動向</span><span class="info-val" style="color:${fNet > 0 ? '#f87171' : '#4ade80'}">${fNet} 張</span></div>
        <div class="info-grid-r"><span class="info-label">🏦 投信動向</span><span class="info-val" style="color:${tNet > 0 ? '#f87171' : '#4ade80'}">${tNet} 張</span></div>
        ${peV ? '<div class="info-grid-l"><span class="info-label">📊 PE</span><span class="info-val" style="color:' + (peV > 25 ? '#f87171' : peV < 12 ? '#4ade80' : '#e2e8f0') + '">' + peV.toFixed(1) + 'x</span></div>' : '<div class="info-grid-l"></div>'}
        ${dyV ? '<div class="info-grid-r"><span class="info-label">💰 殖利率</span><span class="info-val" style="color:' + (dyV > 4 ? '#4ade80' : '#e2e8f0') + '">' + dyV.toFixed(2) + '%</span></div>' : '<div class="info-grid-r"></div>'}
        <div class="info-grid-l"><span class="info-label">🎯 目標價</span><span class="info-val" style="color:#22d3ee">$${targetP}</span></div>
        <div class="info-grid-r"><span class="info-label">⚖️ 賺賠比</span><span class="info-val" style="color:${rr >= 2 ? '#4ade80' : '#f97316'}">${rrD}</span></div>
      </div>
    </div>
  </div>
  <div id="detail-chart" class="tab-panel">
    <div class="section-title">📈 走勢圖</div>
    <div id="detail-lc" class="lc-wrap"></div>
    <p id="detail-lc-empty" style="text-align:center;font-size:11px;color:var(--muted);margin-top:8px;display:none">走勢圖資料載入中...</p>
  </div>
  <div id="detail-ftrend" class="tab-panel">
    <div class="section-title">📑 財報趨勢</div>
    ${ftrendH}
  </div>
  <div id="detail-bt" class="tab-panel">
    ${btH}
  </div>
  <div id="detail-ai" class="tab-panel">
    <div style="display:flex;gap:10px;align-items:flex-start">
      <div style="flex:3;min-width:0">${expertH}${insightH}</div>
      <div style="flex:2;min-width:0;background:var(--surface2);border-radius:8px;padding:12px;align-self:stretch">
        <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:8px">📊 AI 投票</div>
        <div class="ai-vote-row"><div class="ai-name">基本面</div><div class="vote-bar-wrap"><div class="vote-bar" style="width:${aiFund}%;background:${vClr(aiFund)}"></div></div><div class="vote-pct" style="color:${vClr(aiFund)}">${aiFund}%</div></div>
        <div class="ai-vote-row"><div class="ai-name">技術面</div><div class="vote-bar-wrap"><div class="vote-bar" style="width:${aiTech}%;background:${vClr(aiTech)}"></div></div><div class="vote-pct" style="color:${vClr(aiTech)}">${aiTech}%</div></div>
        <div class="ai-vote-row"><div class="ai-name">籌碼面</div><div class="vote-bar-wrap"><div class="vote-bar" style="width:${aiChip}%;background:${vClr(aiChip)}"></div></div><div class="vote-pct" style="color:${vClr(aiChip)}">${aiChip}%</div></div>
        <div class="ai-vote-row"><div class="ai-name">Gemini</div><div class="vote-bar-wrap"><div class="vote-bar" style="width:${aiGem}%;background:#3b82f6"></div></div><div class="vote-pct" style="color:#60a5fa">${aiGem}%</div></div>
      </div>
    </div>
  </div>
  <div id="detail-qa" class="tab-panel">
    <div style="text-align:center;padding:20px">
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">想深入了解 ${name}？直接問 AI</div>
      <a href="https://www.perplexity.ai/search?q=${encodeURIComponent(item['perplexity_prompt'] || 'TSE: ' + code)}" target="_blank" style="display:inline-block;padding:10px 24px;background:#4f46e5;color:white;border-radius:10px;text-decoration:none;font-size:13px;font-weight:700">🔍 Perplexity 深度追蹤</a>
    </div>
  </div>
</div>
<div class="reasoning-essence" style="padding:12px 14px;background:var(--surface2);border-radius:10px;margin:8px 16px">
  <div class="section-title">🧠 推理精華</div>
  <div style="font-size:14px;color:#e2e8f0;line-height:1.75;font-weight:500">${reason || summary || '—'}</div>
  ${item['比喻句'] ? '<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.07);font-size:14px;color:#fbbf24;font-weight:600;letter-spacing:.3px">🎯 ' + item['比喻句'] + '</div>' : ''}
</div>
<div class="kelly-bar-wrap">
  <div class="kelly-bar-header"><span style="font-weight:700;color:${kClr}">${kIcon} 凱利建議倉位</span><span style="font-family:monospace;font-weight:700;color:${kClr}">${kyP}% ${kyL}</span></div>
  <div class="kelly-track"><div class="kelly-fill" style="width:${Math.min(kyP / 25 * 100, 100)}%;background:${kClr}"></div></div>
  <div class="kelly-ticks"><span>0%</span><span>觀望</span><span>保守</span><span>適中</span><span>積極 25%</span></div>
  ${kExtra}
</div>`;
    }

    // === SELECT STOCK ===
    function selectStock(idx) {
      if (idx === currentIdx) return;
      if (currentIdx >= 0) { const old = document.getElementById('row-' + currentIdx); if (old) old.classList.remove('active') }
      const row = document.getElementById('row-' + idx); if (row) { row.classList.add('active'); row.scrollIntoView({ block: 'nearest', behavior: 'smooth' }) }
      currentIdx = idx;
      renderDetail(idx);
    }

    // === TABS ===
    function stab(t, btn) {
      document.querySelectorAll('#detail-panels .tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('#detail-tabs .tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const sections = document.querySelectorAll('#detail-panel .reasoning-essence,#detail-panel .kelly-bar-wrap');
      if (t === 'suggest') {
        sections.forEach(el => el.style.display = '');
      } else {
        sections.forEach(el => el.style.display = 'none');
        document.getElementById('detail-' + t).classList.add('active');
        requestAnimationFrame(() => initC(t));
      }
    }

    // === CHART INIT ===
    function initC(t) {
      if (_ci[t]) return; _ci[t] = true;
      const it = data[currentIdx];
      if (t === 'radar') {
        const cd = it.chart_data || {}, sc = Number(it['評分'] || 5);
        const scores = [
          Number(cd.chips || 50),
          Math.round((Number(cd.tech_ma || 50) + Number(cd.tech_macd || 50)) / 2),
          Number(cd.tech_macd || 50),
          Number(cd.tech_rsi || 50),
          Number(cd.fundamental || 50),
          sc * 10
        ];
        const clr = sc >= 7 ? '#22c55e' : sc <= 3.5 ? '#ef4444' : '#f59e0b';
        const ctx = document.getElementById('detail-radar-canvas'); if (!ctx) return;
        radarChart = new Chart(ctx, { type: 'radar', data: { labels: ['籌碼力', '趨勢力', '動能力(MACD)', '反轉力(RSI)', '基本面力', '綜合評分'], datasets: [{ data: scores, backgroundColor: clr + '28', borderColor: clr, pointBackgroundColor: clr, pointBorderColor: '#1e293b', pointRadius: 6, borderWidth: 2.5 }] }, options: { responsive: false, plugins: { legend: { display: false } }, scales: { r: { min: 0, max: 100, ticks: { stepSize: 25, color: '#475569', font: { size: 10 }, backdropColor: 'transparent' }, pointLabels: { color: '#94a3b8', font: { size: 13, weight: '600' } }, grid: { color: 'rgba(71,85,105,.4)' }, angleLines: { color: 'rgba(71,85,105,.4)' } } } } });
      }
      if (t === 'chart') {
        setTimeout(function () {
          var el = document.getElementById('detail-lc');
          if (!el || !window.LightweightCharts) return;
          var ph = it.price_history || [];
          if (!ph || ph.length === 0) { var emptyEl = document.getElementById('detail-lc-empty'); if (emptyEl) emptyEl.style.display = 'block'; return }
          var w = Math.floor(el.getBoundingClientRect().width || 320);
          priceChart = LightweightCharts.createChart(el, { width: w, height: 220, layout: { background: { color: '#0f172a' }, textColor: '#a6b3c2' }, grid: { vertLines: { color: 'rgba(255,255,255,0.05)' }, horzLines: { color: 'rgba(255,255,255,0.05)' } }, timeScale: { borderColor: 'rgba(255,255,255,0.15)', timeVisible: false }, rightPriceScale: { borderColor: 'rgba(255,255,255,0.15)' } });
          var areaSeries = priceChart.addAreaSeries({ lineColor: '#4ade80', topColor: 'rgba(74,222,128,0.3)', bottomColor: 'rgba(74,222,128,0.02)', lineWidth: 2 });
          areaSeries.setData(ph); priceChart.timeScale().fitContent();
          window.addEventListener('resize', function () { if (priceChart) { priceChart.applyOptions({ width: Math.floor(el.getBoundingClientRect().width) }) } });
        }, 200);
      }
    }

    // === INIT ===
    renderList();
    selectStock(0);

    // Learn Tooltip
    const popup = document.getElementById('learn-popup'); let pTimer;
    function showL(el) { const t = el.getAttribute('data-learn'); if (!t) return; popup.textContent = t; popup.classList.add('show'); const r = el.getBoundingClientRect(); popup.style.left = Math.min(r.left, window.innerWidth - 290) + 'px'; popup.style.top = (r.top - popup.offsetHeight - 8) + 'px'; if (parseInt(popup.style.top) < 60) popup.style.top = (r.bottom + 8) + 'px' }
    function hideL() { popup.classList.remove('show') }
    document.addEventListener('mouseover', e => { const el = e.target.closest('[data-learn]'); if (el) showL(el) });
    document.addEventListener('mouseout', e => { if (e.target.closest('[data-learn]')) hideL() });
    document.addEventListener('touchstart', e => { const el = e.target.closest('[data-learn]'); if (!el) return; pTimer = setTimeout(() => showL(el), 500) }, { passive: true });
    document.addEventListener('touchend', () => { clearTimeout(pTimer); hideL() });
    document.addEventListener('touchmove', () => { clearTimeout(pTimer); hideL() }, { passive: true });
  </script>
</body>

</html>
